fef2f2","fg":"#991b1b"},{"id":"m-084","y":"mcp","g":"MCP: Figma","n":"get_variable_defs","d":"Get design token and variable definitions from a Figma file.","p":"Pulls out all the design settings -- colors, font sizes, spacing values -- that are defined as reusable variables. Like getting the recipe book that tells you exactly which shade of blue and which font size to use everywhere.","tg":["design-tokens","variables","system"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-085","y":"mcp","g":"MCP: Figma","n":"use_figma","d":"General-purpose Figma interaction for complex operations.","p":"A flexible all-purpose tool for doing anything in Figma that the other specific tools don't cover. Like a Swiss Army knife for Figma -- it can handle unusual or complex requests that need custom interaction.","tg":["design","general","flexible"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-086","y":"mcp","g":"MCP: Figma","n":"whoami","d":"Check which Figma account is currently connected.","p":"Shows which Figma account the AI is logged into -- your name, email, and team. Like checking 'who am I?' to make sure you're connected to the right account before making any changes.","tg":["account","auth","identity"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-087","y":"mcp","g":"MCP: Figma","n":"get_code_connect_map","d":"Get mappings between Figma components and codebase components.","p":"Shows which design components in Figma are linked to which code components in your project. Like a translation dictionary between what the designer calls something and what the developer calls it in code.","tg":["code-connect","mapping","sync"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-088","y":"mcp","g":"MCP: Figma","n":"get_code_connect_suggestions","d":"Get AI suggestions for linking Figma components to code.","p":"The AI looks at your Figma designs and your code, then suggests which ones should be linked together. Like a matchmaker that says 'this button in Figma looks like it should connect to this Button component in your code.'","tg":["code-connect","suggestions","ai"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-089","y":"mcp","g":"MCP: Figma","n":"add_code_connect_map","d":"Create a new mapping between a Figma component and code.","p":"Links a design component in Figma to its matching code component. Once linked, anyone looking at the Figma design can instantly see the actual code that builds it. Keeps design and code in sync.","tg":["code-connect","create","link"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-090","y":"mcp","g":"MCP: Figma","n":"send_code_connect_mappings","d":"Push code connect mappings to Figma for the team to see.","p":"Sends your design-to-code links to Figma so the whole team can see them. When a designer clicks on a button in Figma, they'll see the exact code that builds it. Bridges the gap between design and engineering.","tg":["code-connect","publish","team"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-091","y":"mcp","g":"MCP: Figma","n":"create_design_system_rules","d":"Create rules for your design system in Figma.","p":"Sets up guardrails for your team's designs -- which colors are allowed, which fonts to use, how much spacing between elements. Like creating a style guide that Figma enforces automatically so everyone stays consistent.","tg":["design-system","rules","governance"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-092","y":"mcp","g":"MCP: Gmail","n":"gmail_search_messages","d":"Search your Gmail inbox with queries like from, to, subject, or date.","p":"Searches through your email just like the Gmail search bar. Find emails from a specific person, with a certain subject, or from a particular date range. Like having a personal assistant who can instantly find any email you've ever received.","tg":["email","search","inbox"],"ico":"\ud83d\udcec","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-093","y":"mcp","g":"MCP: Gmail","n":"gmail_read_message","d":"Read the full content of a specific email.","p":"Opens up a specific email and reads the whole thing -- subject, from, to, date, and the full body text including any formatting. Like someone reading your email aloud to you with all the details.","tg":["email","read","content"],"ico":"\ud83d\udcec","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-094","y":"mcp","g":"MCP: Gmail","n":"gmail_read_thread","d":"Read an entire email conversation thread.","p":"Reads a whole email chain from start to finish -- every reply, every forward, in order. Like reading the entire back-and-forth conversation instead of just the latest message. Shows the full context.","tg":["email","thread","conversation"],"ico":"\ud83d\udcec","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-095","y":"mcp","g":"MCP: Gmail","n":"gmail_create_draft","d":"Create a draft email ready for review before sending.","p":"Writes an email and saves it as a draft -- it does NOT send it. You can review it, edit it, and send it yourself when ready. Like having someone write a letter for you but leaving it on your desk for approval first.","tg":["email","draft","compose"],"ico":"\ud83d\udcec","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-096","y":"mcp","g":"MCP: Gmail","n":"gmail_get_profile","d":"Get your Gmail account info and email address.","p":"Shows which Gmail account is connected -- your email address, display name, and total message count. Like checking 'which email am I logged into?' to make sure the right account is being used.","tg":["email","account","profile"],"ico":"\ud83d\udcec","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-097","y":"mcp","g":"MCP: n8n","n":"search_templates","d":"Search for pre-built automation workflow templates.","p":"Finds ready-made automation recipes that other people have already built. Like browsing a cookbook for workflow ideas -- 'send a Slack message when a new email arrives' or 'save email attachments to Google Drive.' Just find one and use it.","tg":["automation","templates","search"],"ico":"\u2699","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-098","y":"mcp","g":"MCP: n8n","n":"get_template","d":"Get the full details of a specific automation template.","p":"Pulls up the full recipe for a specific automation -- every step, every connection, every setting. Like opening a cookbook to a specific page and seeing the complete instructions from start to finish.","tg":["automation","template","details"],"ico":"\u2699","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-099","y":"mcp","g":"MCP: n8n","n":"search_nodes","d":"Search for available automation building blocks.","p":"Finds the individual building blocks you can use in automations -- email senders, spreadsheet readers, API connectors, and hundreds more. Like browsing a LEGO catalog to find the right piece for your build.","tg":["automation","nodes","building-blocks"],"ico":"\u2699","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-100","y":"mcp","g":"MCP: n8n","n":"validate_workflow","d":"Check if an automation workflow is valid and will run correctly.","p":"Reviews an automation workflow to make sure everything is connected properly and will actually work. Like a mechanic checking your car before a road trip -- catches problems before they cause issues.","tg":["automation","validation","testing"],"ico":"\u2699","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-101","y":"mcp","g":"MCP: NotebookLM","n":"add_notebook","d":"Create a new NotebookLM notebook with sources.","p":"Creates a new research notebook where you can add articles, PDFs, videos, and other sources. Google's AI then reads everything and becomes an expert on that topic. Like giving a research assistant a stack of reading material.","tg":["notebook","create","research"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-102","y":"mcp","g":"MCP: NotebookLM","n":"ask_question","d":"Ask a question about the content in your notebook.","p":"Ask any question about the stuff you've loaded into your notebook, and the AI answers based only on YOUR sources. It won't make stuff up -- it only uses what you gave it. Like asking a tutor who actually read all your materials.","tg":["notebook","question","ai"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-103","y":"mcp","g":"MCP: NotebookLM","n":"get_notebook","d":"Get details about a specific notebook.","p":"Shows you what's inside a specific notebook -- which sources are loaded, when it was created, and its current status. Like opening a folder and seeing everything that's in it.","tg":["notebook","details","info"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-104","y":"mcp","g":"MCP: NotebookLM","n":"list_notebooks","d":"List all your NotebookLM notebooks.","p":"Shows all the notebooks you've created -- like seeing all the folders on your desk. Each notebook is a different research project with its own sources and conversations.","tg":["notebook","list","library"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-105","y":"mcp","g":"MCP: NotebookLM","n":"search_notebooks","d":"Search across all notebooks for specific content.","p":"Searches through all your notebooks at once to find specific information. Like searching your entire filing cabinet instead of one folder at a time. Finds the needle in the haystack across all your research.","tg":["notebook","search","cross-notebook"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-106","y":"mcp","g":"MCP: NotebookLM","n":"select_notebook","d":"Switch to a specific notebook to work with it.","p":"Picks which notebook you want to work with. Like opening a specific folder on your desk -- once selected, all your questions and commands go to that notebook's materials.","tg":["notebook","select","switch"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-107","y":"mcp","g":"MCP: NotebookLM","n":"update_notebook","d":"Update a notebook's name, description, or settings.","p":"Changes the details of an existing notebook -- rename it, update the description, or modify settings. Like relabeling a folder or adding a sticky note to remind yourself what's inside.","tg":["notebook","update","edit"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-108","y":"mcp","g":"MCP: NotebookLM","n":"remove_notebook","d":"Delete a notebook and all its contents.","p":"Permanently removes a notebook and everything in it. Like throwing away a folder and all the papers inside. Be careful -- once it's gone, it's gone. Use this to clean up notebooks you don't need anymore.","tg":["notebook","delete","cleanup"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-109","y":"mcp","g":"MCP: NotebookLM","n":"list_sessions","d":"List all active NotebookLM sessions.","p":"Shows which notebook sessions are currently running. Like checking which apps are open on your computer. Helps you manage resources and close sessions you're not using.","tg":["notebook","sessions","management"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-110","y":"mcp","g":"MCP: NotebookLM","n":"close_session","d":"Close an active NotebookLM session.","p":"Shuts down a running notebook session to free up resources. Like closing an app when you're done with it. Good practice to close sessions you're not actively using.","tg":["notebook","session","close"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-111","y":"mcp","g":"MCP: NotebookLM","n":"get_health","d":"Check if the NotebookLM service is running properly.","p":"A quick health check to see if NotebookLM is working correctly. Like asking 'are you alive?' before sending important requests. If it says healthy, everything is good to go.","tg":["notebook","health","status"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-112","y":"mcp","g":"MCP: NotebookLM","n":"setup_auth","d":"Set up authentication to connect to NotebookLM.","p":"Logs you into NotebookLM so the AI can access your notebooks. Like entering your password to unlock the filing cabinet. This needs to happen once before you can use any other NotebookLM features.","tg":["notebook","auth","setup"],"ico":"\ud83d\udcd3","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-113","y":"mcp","g":"MCP: Vapi","n":"create_assistant","d":"Create a new AI voice assistant with custom personality and tools.","p":"Builds a brand new AI phone assistant that can answer calls and have conversations. You define its personality, what it knows, and what it can do. Like hiring a virtual receptionist that never sleeps.","tg":["voice","assistant","create"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-114","y":"mcp","g":"MCP: Vapi","n":"create_call","d":"Initiate an outbound phone call from the AI assistant.","p":"Makes the AI assistant call someone on the phone. Give it a phone number and the assistant dials, speaks, and has a real conversation. Like sending your virtual assistant to make a phone call for you.","tg":["voice","call","outbound"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-115","y":"mcp","g":"MCP: Vapi","n":"create_tool","d":"Create a custom tool that the voice assistant can use during calls.","p":"Gives your phone assistant a new ability -- like looking up account info, scheduling appointments, or checking order status while on a call. Like teaching your receptionist a new skill they can use while talking to callers.","tg":["voice","tool","capability"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-116","y":"mcp","g":"MCP: Vapi","n":"get_assistant","d":"Get details about a specific AI voice assistant.","p":"Shows you everything about one of your phone assistants -- its personality, what tools it has, how it's configured. Like pulling up the employee file for your virtual receptionist.","tg":["voice","assistant","details"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-117","y":"mcp","g":"MCP: Vapi","n":"get_call","d":"Get details and transcript of a specific phone call.","p":"Pulls up the full record of a phone call -- when it happened, how long it lasted, and a complete transcript of what was said. Like reading the minutes of a phone conversation after it's over.","tg":["voice","call","transcript"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-118","y":"mcp","g":"MCP: Vapi","n":"list_assistants","d":"List all your AI voice assistants.","p":"Shows all the phone assistants you've created. Like seeing your roster of virtual employees. Each one might handle different types of calls or have different personalities and skills.","tg":["voice","assistants","list"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-119","y":"mcp","g":"MCP: Vapi","n":"list_calls","d":"List all calls made or received by your assistants.","p":"Shows a log of every phone call your AI assistants have handled -- incoming and outgoing. Like a call history on your phone but for all your virtual assistants combined. Great for tracking activity.","tg":["voice","calls","history"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-120","y":"mcp","g":"MCP: Vapi","n":"list_phone_numbers","d":"List all phone numbers assigned to your assistants.","p":"Shows all the phone numbers your AI assistants are using. Each assistant can have its own phone number that people can call. Like checking which extension each employee is on.","tg":["voice","numbers","directory"],"ico":"\ud83d\udcde","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-121","y":"mcp","g":"MCP: Canva","n":"create-canva-app-instructions","d":"Get instructions for creating a Canva app.","p":"Provides step-by-step guidance on how to build a custom app that works inside Canva. Like getting a recipe book for creating your own design tools that plug into Canva's platform.","tg":["canva","app","instructions"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-122","y":"mcp","g":"MCP: Canva","n":"canva-apps-migration-instructions","d":"Get migration instructions for updating Canva apps.","p":"Guides you through updating an older Canva app to work with the latest version. Like getting instructions for upgrading your car's software so everything keeps working with new features.","tg":["canva","migration","update"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-123","y":"mcp","g":"MCP: Canva","n":"design-review-instructions","d":"Get guidelines for reviewing Canva app designs.","p":"Provides a checklist and best practices for reviewing designs made with Canva apps. Like having a design teacher look over your shoulder and tell you what to check for quality and consistency.","tg":["canva","review","quality"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-124","y":"mcp","g":"MCP: Canva","n":"read-canva-apps-sdk-documentation-index","d":"Read the Canva Apps SDK documentation index.","p":"Opens the master table of contents for building Canva apps. Like looking at the index of a textbook to find exactly which chapter covers what you need to learn about building Canva integrations.","tg":["canva","sdk","documentation"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-125","y":"mcp","g":"MCP: Canva","n":"read-canva-apps-sdk-design-guidelines","d":"Read the design guidelines for Canva apps.","p":"Shows the official rules for how Canva apps should look and behave. Like reading the dress code before a formal event -- follow these guidelines and your app will fit perfectly into Canva's interface.","tg":["canva","design","guidelines"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-126","y":"mcp","g":"MCP: Canva","n":"read-canva-app-ui-kit-index","d":"Browse the Canva UI component library index.","p":"Shows all the pre-built interface pieces available for Canva apps -- buttons, menus, sliders, and more. Like browsing a LEGO catalog of UI parts you can snap together to build your app's interface.","tg":["canva","ui-kit","components"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-127","y":"mcp","g":"MCP: Canva","n":"read-canva-app-ui-kit-page","d":"Read details about a specific Canva UI component.","p":"Gets the full details on one specific UI piece -- how it looks, how to use it, what options it has. Like reading the instruction manual for one specific LEGO piece before you snap it into your build.","tg":["canva","ui-kit","details"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-128","y":"mcp","g":"MCP: Canva","n":"read-canva-app-ui-kit-patterns-catalog","d":"Browse reusable UI patterns for Canva apps.","p":"Shows common design patterns that work well in Canva apps -- like search bars, settings panels, or list views. These are proven recipes for building interfaces that feel natural and work smoothly.","tg":["canva","patterns","ui"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-129","y":"mcp","g":"MCP: Canva","n":"read-canva-cli-documentation","d":"Read the Canva CLI documentation.","p":"Shows how to use Canva's command-line tool for building and testing apps. Like reading the manual for a power tool -- it covers installation, setup, and all the commands you can run from the terminal.","tg":["canva","cli","documentation"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-130","y":"mcp","g":"MCP: Canva","n":"read-canva-connect-documentation-index","d":"Read the Canva Connect API documentation.","p":"Shows how to connect external apps and services to Canva. Like reading the instructions for plugging in accessories to your computer -- covers how outside tools can talk to Canva and share data.","tg":["canva","connect","api"],"ico":"\ud83c\udfa8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-131","y":"mcp","g":"MCP: Google Calendar","n":"authenticate","d":"Connect to your Google Calendar account.","p":"Logs you into Google Calendar so the AI can see your schedule, check for conflicts, and help manage your time. Like giving your assistant the key to your calendar. This needs to happen once before any calendar features work.","tg":["calendar","auth","google"],"ico":"\ud83d\udcc5","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-132","y":"mcp","g":"MCP: Outreach","n":"authenticate","d":"Connect to your Outreach.io sales engagement account.","p":"Logs you into Outreach so the AI can access your sales sequences, contact lists, and email campaigns. Like giving your assistant access to your sales headquarters. Needs to happen once before using Outreach features.","tg":["outreach","auth","sales"],"ico":"\ud83d\udce8","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-133","y":"mcp","g":"MCP: Exa","n":"exa_search","d":"AI-powered semantic search that understands meaning, not just keywords.","p":"A super-smart search engine that understands concepts, not just words. If you search 'companies helping schools get better internet', it finds relevant results even if those exact words don't appear on the page. Like having a librarian who actually understands what you're looking for.","tg":["search","ai","semantic"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-134","y":"mcp","g":"MCP: Firecrawl","n":"firecrawl_scrape","d":"Crawl and scrape websites into clean, structured data.","p":"Goes to a website and pulls out all the useful content in a clean, organized format -- stripping away ads, navigation menus, and clutter. Like sending someone to copy the important parts of a website into a neat document. Great for research and data collection.","tg":["scraping","crawl","data-extraction"],"ico":"\ud83d\udd78","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-doc-1","y":"skill","g":"Document Generation","n":"/pdf","d":"Read, create, merge, split, rotate, and watermark PDF files.","p":"This tool works with PDF files \u2014 the kind you get when you download a contract or a flyer. It can open them, combine multiple PDFs into one, chop one into pieces, spin pages sideways, or stamp a watermark on every page. Use it whenever you need to build a PDF from scratch or clean one up.","tg":["pdf","merge","split","watermark","documents"],"cmd":"/pdf","ico":"\ud83d\udcc4","bg":"#fffbeb","fg":"#92400e"},{"id":"s-doc-2","y":"skill","g":"Document Generation","n":"/docx","d":"Create and edit Word documents with full formatting.","p":"This makes Microsoft Word files \u2014 the .docx kind. It can set up headings, bold text, bullet lists, tables, and page breaks so the document looks professional. Use it when you need a formatted letter, report, or proposal that someone can open in Word.","tg":["word","docx","documents","formatting"],"cmd":"/docx","ico":"\ud83d\udcc4","bg":"#fffbeb","fg":"#92400e"},{"id":"s-doc-3","y":"skill","g":"Document Generation","n":"/pptx","d":"Build PowerPoint presentations with slides, layouts, and branding.","p":"This builds slideshow presentations \u2014 the kind you click through in a meeting. It creates slides with titles, bullet points, images, and your brand colors. Use it when you need a pitch deck, training presentation, or proposal slides.","tg":["powerpoint","pptx","slides","presentations"],"cmd":"/pptx","ico":"\ud83d\udcc4","bg":"#fffbeb","fg":"#92400e"},{"id":"s-doc-4","y":"skill","g":"Document Generation","n":"/xlsx","d":"Generate Excel spreadsheets with formulas, charts, and styling.","p":"This creates Excel spreadsheets \u2014 the ones with rows, columns, and math. It can add formulas that calculate totals automatically, color-code cells, and even build charts. Use it when you need a budget, pricing sheet, or any data organized in a grid.","tg":["excel","xlsx","spreadsheets","formulas","charts"],"cmd":"/xlsx","ico":"\ud83d\udcc4","bg":"#fffbeb","fg":"#92400e"},{"id":"s-des-1","y":"skill","g":"Design & Frontend","n":"/frontend-design","d":"Design and build polished web page layouts from scratch.","p":"This designs the look and feel of a web page \u2014 colors, spacing, buttons, fonts, the whole visual experience. Think of it like hiring a designer who also writes the code. Use it when you want a new page or section of your website to look great.","tg":["design","frontend","web","layout","ui"],"cmd":"/frontend-design","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-2","y":"skill","g":"Design & Frontend","n":"/cinematic-website","d":"Create scroll-animated cinematic websites with video frame mapping.","p":"This builds websites that feel like watching a movie \u2014 as you scroll down, images animate, text fades in, and video frames play tied to your scroll position. It's the 'wow' effect you see on Apple or Nike product pages. Use it when you want a website that impresses visitors instantly.","tg":["cinematic","scroll-animation","video","hero","premium"],"cmd":"/cinematic-website","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-3","y":"skill","g":"Design & Frontend","n":"/animate-hero","d":"Add animated hero sections with video backgrounds and mobile fallbacks.","p":"The hero is the big banner at the very top of a website \u2014 the first thing people see. This tool makes that section eye-catching with a looping video background on computers and a still image on phones (so it loads fast). Use it when the top of your site needs to grab attention.","tg":["hero","animation","video-background","mobile","landing-page"],"cmd":"/animate-hero","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-4","y":"skill","g":"Design & Frontend","n":"/tailwind-design-system","d":"Set up a Tailwind CSS design system with consistent tokens and components.","p":"Tailwind is a popular way to style websites. This tool sets up a consistent set of colors, font sizes, spacings, and reusable building blocks so every page on your site looks like it belongs together. Use it at the start of a project to keep the design organized.","tg":["tailwind","css","design-system","tokens","components"],"cmd":"/tailwind-design-system","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-5","y":"skill","g":"Design & Frontend","n":"/ui-ux-pro-max","d":"Apply industry-specific UI/UX design patterns for professional results.","p":"This gives design advice and builds layouts tailored to your specific industry \u2014 real estate sites look different from tech sites which look different from restaurant sites. It knows what works best for each type of business. Use it when you want a site that looks like a pro designed it for your niche.","tg":["ui","ux","industry","design-patterns","professional"],"cmd":"/ui-ux-pro-max","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-6","y":"skill","g":"Design & Frontend","n":"/web-design-guidelines","d":"Reference web design best practices for accessibility, layout, and typography.","p":"This is like a rulebook for good web design \u2014 it covers things like making sure text is readable, buttons are big enough to tap on phones, and colors have enough contrast for people with vision issues. Use it when you want to make sure your site follows professional standards.","tg":["guidelines","accessibility","typography","best-practices"],"cmd":"/web-design-guidelines","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-7","y":"skill","g":"Design & Frontend","n":"/design-review","d":"Run a comprehensive visual design review with screenshot comparison.","p":"This checks your website's design by taking screenshots and comparing them to what was intended. It looks for things that are misaligned, wrong colors, broken layouts on different screen sizes, and console errors. Use it after making changes to make sure nothing looks broken.","tg":["review","screenshots","qa","visual-testing","comparison"],"cmd":"/design-review","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-8","y":"skill","g":"Design & Frontend","n":"/setup-playwright-design","d":"Configure Playwright for automated visual testing and design validation.","p":"Playwright is a robot that opens a real web browser and clicks around your site automatically. This sets it up so it can take screenshots, test buttons, and verify your design looks right \u2014 like having a tireless QA person checking every page. Use it to catch visual bugs before real users see them.","tg":["playwright","visual-testing","automation","setup","browser"],"cmd":"/setup-playwright-design","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-9","y":"skill","g":"Design & Frontend","n":"/vercel-composition-patterns","d":"Apply Vercel-recommended component composition patterns in React.","p":"Vercel hosts websites and knows what works. This tool applies their recommended ways of organizing React components \u2014 like stacking Lego bricks in the smartest order so your website loads fast and is easy to update later. Use it when building or refactoring a React website.","tg":["vercel","react","composition","patterns","components"],"cmd":"/vercel-composition-patterns","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-des-10","y":"skill","g":"Design & Frontend","n":"/vercel-react-best-practices","d":"Follow Vercel and React official best practices for performance and structure.","p":"This applies the official recommended ways to build React websites \u2014 things like making pages load faster, organizing code so it's maintainable, and avoiding common mistakes. Think of it as building a house according to the architect's blueprint instead of winging it.","tg":["vercel","react","best-practices","performance","structure"],"cmd":"/vercel-react-best-practices","ico":"\ud83c\udfa8","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-mkt-1","y":"skill","g":"Marketing & Outreach","n":"/spectrum","d":"Manage Spectrum Enterprise account outreach and campaign data.","p":"This handles everything related to reaching out to Spectrum Enterprise (Charter) accounts \u2014 pulling account data, tracking who's been contacted, and organizing the campaign. Use it when working on the Spectrum sales pipeline.","tg":["spectrum","charter","accounts","outreach","sales"],"cmd":"/spectrum","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-2","y":"skill","g":"Marketing & Outreach","n":"/spectrum-campaign","d":"Plan and orchestrate multi-wave Spectrum email campaigns.","p":"This plans out a series of emails to Spectrum accounts \u2014 first touch, follow-up, and final nudge \u2014 spread across waves so nobody gets spammed. It's like a campaign manager that decides who gets what email and when. Use it when launching or planning a new outreach wave.","tg":["spectrum","campaign","email-waves","planning","strategy"],"cmd":"/spectrum-campaign","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-3","y":"skill","g":"Marketing & Outreach","n":"/spectrum-send","d":"Send approved Spectrum outreach emails in batches with logging.","p":"This actually sends the emails to Spectrum contacts in controlled batches \u2014 not all at once, but in groups so it looks natural. Every send is logged to Supabase and BCC'd to Salesforce. Use it after drafts are approved and ready to go out.","tg":["spectrum","send","email","batch","logging"],"cmd":"/spectrum-send","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-4","y":"skill","g":"Marketing & Outreach","n":"/open-house-blitz","d":"Create and execute open house marketing blitz across social media.","p":"This creates all the marketing materials for a real estate open house \u2014 social media posts, tracked links, images \u2014 and posts them across dozens of Facebook groups in a coordinated blitz. Use it the week before an open house to maximize attendance.","tg":["open-house","real-estate","social-media","blitz","marketing"],"cmd":"/open-house-blitz","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-5","y":"skill","g":"Marketing & Outreach","n":"/fb-group-poster","d":"Post listings to Facebook groups with interleaved rotation.","p":"This posts real estate listings to Facebook groups one by one, rotating between different properties so the same listing doesn't appear back-to-back. It spaces them out to look natural, not spammy. Use it when you have multiple properties to promote across Facebook groups.","tg":["facebook","groups","posting","rotation","social-media"],"cmd":"/fb-group-poster","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-6","y":"skill","g":"Marketing & Outreach","n":"/michelle-sanchez-brand","d":"Apply Michelle Sanchez / Coldwell Banker Global Luxury brand guidelines.","p":"This makes sure everything created for Michelle follows the Coldwell Banker Global Luxury look \u2014 black, white, and steel colors only, specific fonts, elegant and high-end feel. Use it whenever creating any marketing material for Michelle's real estate business.","tg":["branding","coldwell-banker","luxury","michelle","guidelines"],"cmd":"/michelle-sanchez-brand","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-7","y":"skill","g":"Marketing & Outreach","n":"/active-listing-project","d":"Set up a complete marketing project folder for a new real estate listing.","p":"When Michelle gets a new listing, this creates the entire project structure \u2014 folders for photos, floorplans, data, videos, social posts, and more. It's like setting up a new client folder with everything organized from day one. Use it as soon as a new property goes active.","tg":["listing","real-estate","project-setup","folders","organization"],"cmd":"/active-listing-project","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-mkt-8","y":"skill","g":"Marketing & Outreach","n":"/client-relocation","d":"Build relocation resource pages with maps, schools, and neighborhood data.","p":"This creates a custom web page for someone moving to a new area \u2014 it includes interactive maps, school ratings, drive-time circles, nearby restaurants, and neighborhood info. It's like a personalized welcome packet for a relocating buyer. Use it when a client is moving from out of town.","tg":["relocation","maps","schools","neighborhoods","real-estate"],"cmd":"/client-relocation","ico":"\ud83d\udce7","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-1","y":"skill","g":"Video & Media","n":"/create-video","d":"Create videos programmatically using Remotion and React components.","p":"This builds videos using code instead of a video editor \u2014 think of it like programming a movie scene by scene. You define what appears on screen, when it moves, and how long it lasts, and it renders a finished video file. Use it when you need custom branded videos at scale.","tg":["video","remotion","react","rendering","programmatic"],"cmd":"/create-video","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-2","y":"skill","g":"Video & Media","n":"/avatar-video","d":"Generate AI avatar videos using HeyGen API with custom scripts.","p":"This creates videos where a realistic AI person talks to the camera and says whatever script you write. It uses the HeyGen service with our custom avatar (Gala). Use it for personalized outreach videos, training content, or client-facing introductions.","tg":["avatar","heygen","ai-video","personalized","outreach"],"cmd":"/avatar-video","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-3","y":"skill","g":"Video & Media","n":"/video-outreach-pipeline","d":"Run the full video outreach pipeline: script, avatar, landing page, and send.","p":"This runs the entire video outreach process end-to-end \u2014 writes the script, generates the AI avatar video, builds a personalized landing page, and prepares the email to send it. It's the full assembly line from idea to delivered video message. Use it for high-touch prospect outreach.","tg":["pipeline","outreach","avatar","landing-page","automation"],"cmd":"/video-outreach-pipeline","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-4","y":"skill","g":"Video & Media","n":"/active-listing-render","d":"Render social media videos and images for active real estate listings.","p":"This takes a property's photos and data and turns them into ready-to-post social media content \u2014 reels, stories, Facebook posts, Pinterest pins, and slideshows. Each format is sized correctly for its platform. Use it after setting up a new listing project to generate all the marketing visuals.","tg":["render","listing","social-media","real-estate","content"],"cmd":"/active-listing-render","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-5","y":"skill","g":"Video & Media","n":"/ingest-video","d":"Download, transcribe, and extract knowledge from YouTube videos.","p":"This watches a YouTube video for you \u2014 it downloads it, converts the speech to text, pulls out the key ideas, and saves them as organized notes. It's like having someone take perfect notes on a lecture. Use it when you find a useful video and want to capture everything it teaches.","tg":["youtube","transcription","knowledge","extraction","learning"],"cmd":"/ingest-video","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vid-6","y":"skill","g":"Video & Media","n":"/pdf-to-knowledge","d":"Extract structured knowledge from PDF documents into the knowledge base.","p":"This reads a PDF \u2014 like a whitepaper, manual, or report \u2014 and pulls out the important facts, organizing them into your knowledge base so they can be referenced later. It's like reading a textbook and writing perfect study notes. Use it when you get a document full of info you want to keep.","tg":["pdf","knowledge","extraction","documents","learning"],"cmd":"/pdf-to-knowledge","ico":"\ud83c\udfac","bg":"#fffbeb","fg":"#92400e"},{"id":"s-vkb-1","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-remotion_skills","d":"Reference guide for Remotion video framework capabilities and patterns.","p":"This is a cheat sheet for Remotion \u2014 the tool that builds videos from code. It lists what Remotion can do, how to structure scenes, and common patterns. It's not a button you press \u2014 it's knowledge that helps the AI build better videos. Loaded automatically when working on video projects.","tg":["remotion","reference","video","knowledge"],"cmd":"/kb-remotion_skills","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-2","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-react_video_frames","d":"Patterns for building video compositions with React components.","p":"This teaches the AI how to build video frames using React \u2014 things like transitions, overlays, text animations, and timing. Think of it as a recipe book for video effects. Loaded when creating Remotion video compositions.","tg":["react","frames","composition","patterns","video"],"cmd":"/kb-react_video_frames","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-3","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-plan_mode_video","d":"Planning methodology for complex video projects before execution.","p":"Before building a video, this helps plan it out \u2014 how many scenes, what order, what text goes where, timing of each section. It's like storyboarding a movie before filming. Helps avoid wasted time re-doing videos that weren't thought through.","tg":["planning","video","storyboard","methodology"],"cmd":"/kb-plan_mode_video","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-4","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-scene_frame_editing","d":"Techniques for editing individual scenes and frames in video compositions.","p":"This covers how to tweak specific parts of a video \u2014 changing one scene's background, adjusting a single frame's timing, or fixing one slide without re-rendering the whole thing. Like editing one page of a book without reprinting everything.","tg":["editing","scenes","frames","video","precision"],"cmd":"/kb-scene_frame_editing","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-5","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-motion_graphics","d":"Motion graphics patterns: easing, spring animations, and kinetic typography.","p":"This is a guide for making things move beautifully in videos \u2014 text that bounces in, logos that spin smoothly, objects that slide with natural-feeling physics. It's the difference between stiff robot movement and fluid, professional animation.","tg":["motion","graphics","animation","easing","typography"],"cmd":"/kb-motion_graphics","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-6","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-custom_assets","d":"Guide for integrating custom images, fonts, audio, and brand assets into videos.","p":"This explains how to bring your own stuff into videos \u2014 your logo, brand fonts, background music, property photos. It makes sure custom files get loaded correctly and look sharp. Use it when building branded content with specific assets.","tg":["assets","custom","branding","fonts","images"],"cmd":"/kb-custom_assets","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-7","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-cross_platform_video","d":"Export specifications for different social media platforms.","p":"Every social media platform wants videos in different sizes \u2014 Instagram wants vertical, YouTube wants wide, Facebook wants square. This knows all the exact sizes, lengths, and file formats each platform requires so your videos look perfect everywhere.","tg":["cross-platform","export","social-media","formats","specs"],"cmd":"/kb-cross_platform_video","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-8","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-browser_video_editor","d":"Browser-based video preview and editing workflow reference.","p":"This covers how to preview and tweak videos right in your web browser instead of waiting for a full render each time. It's like having a fast-forward preview button so you can check your work quickly before committing to the final version.","tg":["browser","preview","editing","workflow","fast"],"cmd":"/kb-browser_video_editor","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-vkb-9","y":"skill","g":"Video & Media \u2014 Knowledge Base","n":"/kb-ai_asset_research","d":"AI-powered research for stock footage, images, and design inspiration.","p":"This searches the internet for stock photos, video clips, design ideas, and visual inspiration using AI to find the best matches for your project. Instead of scrolling through thousands of stock photos, AI finds what fits. Use it when you need visuals but don't have your own.","tg":["research","stock","assets","ai","inspiration"],"cmd":"/kb-ai_asset_research","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#475569"},{"id":"s-res-1","y":"skill","g":"Research & Knowledge","n":"/research-deep","d":"Conduct deep multi-source research on any topic with structured output.","p":"This does serious research \u2014 not just a quick Google search, but digging through multiple sources, cross-referencing facts, and organizing everything into a clear report. It's like hiring a research assistant for an afternoon. Use it when you need thorough, reliable information on a topic.","tg":["research","deep-dive","multi-source","analysis","report"],"cmd":"/research-deep","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-2","y":"skill","g":"Research & Knowledge","n":"/knowledge-ingest","d":"Ingest documents, videos, or web pages into the structured knowledge base.","p":"This takes any information source \u2014 a PDF, a YouTube video, a web page \u2014 and digests it into organized notes stored in your knowledge base. It's like feeding a book into a filing cabinet that sorts everything automatically. Use it to build up your AI's knowledge on any topic.","tg":["knowledge","ingestion","documents","learning","organization"],"cmd":"/knowledge-ingest","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-3","y":"skill","g":"Research & Knowledge","n":"/programmatic-seo","d":"Generate SEO-optimized pages at scale using data and templates.","p":"This creates lots of web pages automatically, each targeting a different search term \u2014 like making a separate page for every city you serve. Google loves these pages because they're specific and helpful. Use it when you want to show up in search results for dozens or hundreds of keywords.","tg":["seo","programmatic","pages","scale","search"],"cmd":"/programmatic-seo","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-4","y":"skill","g":"Research & Knowledge","n":"/seo-audit","d":"Audit a website for SEO issues and generate an improvement report.","p":"This checks your website's SEO health \u2014 are pages loading fast? Do they have proper titles? Are images optimized? Is anything broken? It's like a doctor's checkup for your website's Google ranking. Use it periodically to find and fix things that hurt your search visibility.","tg":["seo","audit","performance","ranking","optimization"],"cmd":"/seo-audit","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-5","y":"skill","g":"Research & Knowledge","n":"/setup-notebooklm","d":"Configure Google NotebookLM integration for AI-powered document analysis.","p":"NotebookLM is Google's tool that reads your documents and answers questions about them. This sets up the connection so your AI can send documents to NotebookLM for deep analysis. Use it when you have complex documents you need to understand or extract insights from.","tg":["notebooklm","google","analysis","documents","setup"],"cmd":"/setup-notebooklm","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-6","y":"skill","g":"Research & Knowledge","n":"/setup-obsidian","d":"Set up Obsidian vault integration for knowledge management.","p":"Obsidian is a note-taking app where all your notes link together like a web. This connects it to your AI so notes sync automatically and the AI can search through everything you've saved. Use it to set up a permanent, searchable knowledge vault.","tg":["obsidian","vault","notes","knowledge","setup"],"cmd":"/setup-obsidian","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-res-7","y":"skill","g":"Research & Knowledge","n":"/audit-website","d":"Run a comprehensive website audit covering performance, SEO, accessibility, and security.","p":"This gives your website a full report card \u2014 speed, SEO, accessibility for disabled users, and security vulnerabilities. It checks everything from broken links to slow-loading images to missing security headers. Use it before launching a site or when something feels off.","tg":["audit","website","performance","accessibility","security"],"cmd":"/audit-website","ico":"\ud83d\udcda","bg":"#f3f4f6","fg":"#374151"},{"id":"s-tst-1","y":"skill","g":"Testing & Quality","n":"/webapp-testing","d":"Run end-to-end tests on web applications using browser automation.","p":"This opens your website in a real browser and pretends to be a user \u2014 clicking buttons, filling out forms, navigating pages \u2014 to make sure everything works. If a button is broken or a form doesn't submit, it catches it. Use it after making changes to make sure nothing broke.","tg":["testing","e2e","browser","automation","qa"],"cmd":"/webapp-testing","ico":"\u2705","bg":"#ecfdf5","fg":"#166534"},{"id":"s-tst-2","y":"skill","g":"Testing & Quality","n":"/code-review","d":"Review code for bugs, security issues, and best practices.","p":"This reads through code with a critical eye \u2014 looking for bugs, security holes, bad practices, and things that could cause problems later. It's like having a senior engineer review your work before it goes live. Use it before deploying any important code change.","tg":["review","bugs","security","best-practices","quality"],"cmd":"/code-review","ico":"\u2705","bg":"#ecfdf5","fg":"#166534"},{"id":"s-tst-3","y":"skill","g":"Testing & Quality","n":"/multi-model-test","d":"Test prompts across multiple AI models and compare results side by side.","p":"This sends the same question to different AI models \u2014 ChatGPT, Gemini, Claude \u2014 and shows you all their answers next to each other. It's like asking three experts the same question and comparing who gives the best answer. Use it when picking the best AI model for a specific task.","tg":["multi-model","comparison","testing","prompts","evaluation"],"cmd":"/multi-model-test","ico":"\u2705","bg":"#ecfdf5","fg":"#166534"},{"id":"s-tst-4","y":"skill","g":"Testing & Quality","n":"/simplify","d":"Simplify overly complex code while preserving functionality.","p":"This takes complicated, messy code and rewrites it to be simpler and cleaner \u2014 same result, fewer lines, easier to understand. It's like editing a long, confusing sentence into a short, clear one. Use it when code has gotten tangled up and hard to maintain.","tg":["simplify","refactor","clean-code","maintainability","readability"],"cmd":"/simplify","ico":"\u2705","bg":"#ecfdf5","fg":"#166534"},{"id":"s-tst-5","y":"skill","g":"Testing & Quality","n":"/atomic-auditor","d":"Audit code architecture against atomic design principles and SRP.","p":"This checks if your code follows the atomic architecture rules \u2014 every piece does one job, nothing is tangled together, and everything is organized into atoms, molecules, and organisms. It's like an inspector checking that a building follows the blueprint. Use it after big refactors.","tg":["audit","atomic","architecture","srp","design-principles"],"cmd":"/atomic-auditor","ico":"\u2705","bg":"#ecfdf5","fg":"#166534"},{"id":"s-inf-1","y":"skill","g":"Infrastructure & Ops","n":"/deploy-vercel","d":"Deploy websites and apps to Vercel with proper configuration.","p":"Vercel is where your websites live on the internet. This pushes your latest code to Vercel so the world can see it \u2014 handles the build process, environment variables, and routing rules. It's like pressing the 'publish' button for your website. Use it when changes are ready to go live.","tg":["deploy","vercel","hosting","production","ci-cd"],"cmd":"/deploy-vercel","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-2","y":"skill","g":"Infrastructure & Ops","n":"/setup-google-workspace","d":"Configure Google Workspace CLI for Gmail, Drive, Calendar, and Sheets access.","p":"This connects your AI to your Google account \u2014 Gmail, Google Drive, Calendar, and Sheets. Once set up, the AI can read emails, find files, check your schedule, and update spreadsheets on your behalf. Use it once to unlock Google integrations for all future sessions.","tg":["google","workspace","gmail","drive","calendar","setup"],"cmd":"/setup-google-workspace","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-3","y":"skill","g":"Infrastructure & Ops","n":"/setup-agent-teams","d":"Configure Claude Code Agent Teams for multi-agent parallel collaboration.","p":"Agent Teams lets multiple AI agents work together \u2014 one researches, one writes, one reviews \u2014 all communicating with each other. This sets up the configuration so you can spawn coordinated teams. Use it when you want multiple AI workers tackling a big project together.","tg":["agent-teams","multi-agent","parallel","collaboration","setup"],"cmd":"/setup-agent-teams","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-4","y":"skill","g":"Infrastructure & Ops","n":"/context-engineer","d":"Optimize claude.md files and context structure for better AI performance.","p":"This fine-tunes how the AI understands your project \u2014 organizing instructions, rules, and references so the AI has the right information at the right time without getting overloaded. It's like organizing a filing cabinet so you can find anything in seconds. Use it when the AI seems confused or forgetful.","tg":["context","optimization","claude-md","performance","configuration"],"cmd":"/context-engineer","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-5","y":"skill","g":"Infrastructure & Ops","n":"/update-config","d":"Update Claude Code configuration and settings files.","p":"This changes the AI's settings \u2014 things like which model to use, what permissions are granted, and how sessions behave. It's like going into the Settings app on your phone. Use it when you need to change how Claude Code operates.","tg":["config","settings","update","preferences","administration"],"cmd":"/update-config","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-6","y":"skill","g":"Infrastructure & Ops","n":"/keybindings-help","d":"Show all Claude Code keyboard shortcuts and keybindings.","p":"This shows you all the keyboard shortcuts \u2014 like pressing Shift+Tab to enter plan mode or Escape twice to fork a conversation. It's a cheat sheet for power users. Use it when you can't remember how to do something quickly in Claude Code.","tg":["keybindings","shortcuts","help","reference","productivity"],"cmd":"/keybindings-help","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-7","y":"skill","g":"Infrastructure & Ops","n":"/skills-install","d":"Install and manage Claude Code skills from the skills marketplace.","p":"This installs new abilities into your AI from a marketplace of pre-built skills. It's like downloading apps from an app store \u2014 each skill teaches the AI something new. Use it when you want to add new capabilities without building them yourself.","tg":["skills","install","marketplace","capabilities","management"],"cmd":"/skills-install","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-8","y":"skill","g":"Infrastructure & Ops","n":"/map-builder","d":"Build interactive maps with Mapbox, Google Maps, or custom data layers.","p":"This creates interactive maps you can embed on websites \u2014 with pins, driving-time circles, color-coded zones, and clickable markers. Think Google Maps but customized for your business. Use it for real estate area maps, service coverage maps, or school district visualizations.","tg":["maps","mapbox","google-maps","interactive","visualization"],"cmd":"/map-builder","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-9","y":"skill","g":"Infrastructure & Ops","n":"/morning-command-center","d":"Launch the daily command center dashboard with all active projects.","p":"This opens a dashboard showing everything going on \u2014 active campaigns, pending tasks, email stats, listing status, pipeline health. It's your mission control screen for the day. Use it every morning to see what needs attention and what's running smoothly.","tg":["dashboard","command-center","morning","status","overview"],"cmd":"/morning-command-center","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-inf-10","y":"skill","g":"Infrastructure & Ops","n":"/morning-brief","d":"Generate a concise morning briefing with priorities, calendar, and action items.","p":"This writes you a short morning report \u2014 what happened overnight, what's on the calendar today, what emails need attention, and what tasks are most important. It's like a personal assistant briefing you over coffee. Use it to start each workday focused.","tg":["briefing","morning","priorities","calendar","summary"],"cmd":"/morning-brief","ico":"\u2699","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-wf-1","y":"skill","g":"Workflow & Meta","n":"/skill-creator","d":"Create new custom skills using the built-in skill creation wizard.","p":"This builds new skills \u2014 you describe what you want the AI to be able to do, and it writes the skill file automatically. It's like teaching the AI a new trick by explaining it once. Use it when you find yourself repeating the same instructions over and over.","tg":["skill-creator","automation","custom","wizard","meta"],"cmd":"/skill-creator","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-2","y":"skill","g":"Workflow & Meta","n":"/agent-browser","d":"Launch Vercel Agent Browser for autonomous web navigation and testing.","p":"This gives the AI a real web browser it can control \u2014 navigating pages, clicking buttons, filling forms, and taking screenshots. It's like giving the AI hands to use a computer. Use it when the AI needs to interact with websites, test user journeys, or verify live pages.","tg":["browser","agent","vercel","navigation","testing"],"cmd":"/agent-browser","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-3","y":"skill","g":"Workflow & Meta","n":"/worktree-parallel","d":"Set up git worktrees for parallel development across multiple branches.","p":"This creates multiple copies of your project in separate folders, each on a different branch \u2014 so you can work on Feature A in one folder and Feature B in another without them interfering. It's like having multiple desks, each with a different project spread out. Use it when juggling several features at once.","tg":["git","worktree","parallel","branches","development"],"cmd":"/worktree-parallel","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-4","y":"skill","g":"Workflow & Meta","n":"/parallel-tasks","d":"Run multiple AI tasks simultaneously across separate sessions.","p":"This launches several AI sessions at the same time, each working on a different task. While one writes an email, another builds a spreadsheet, and a third researches competitors \u2014 all at once. It's like having a team of assistants instead of one. Use it when you have lots of independent tasks.","tg":["parallel","multi-task","sessions","productivity","concurrent"],"cmd":"/parallel-tasks","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-5","y":"skill","g":"Workflow & Meta","n":"/loop","d":"Run a task in a continuous improvement loop with metrics tracking.","p":"This runs a task over and over, measuring results each time and tweaking the approach to get better outcomes. It's like practicing free throws \u2014 shoot, check the score, adjust, repeat. Use it for A/B testing emails, optimizing copy, or any task where you want to improve through iteration.","tg":["loop","iteration","optimization","metrics","improvement"],"cmd":"/loop","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-6","y":"skill","g":"Workflow & Meta","n":"/schedule","d":"Schedule tasks to run automatically at specific times or intervals.","p":"This sets up tasks to run on a timer \u2014 like sending a morning report at 7 AM every day or checking for new leads every 4 hours. It's an alarm clock for AI tasks. Use it when something needs to happen regularly without you remembering to trigger it.","tg":["schedule","automation","cron","timer","recurring"],"cmd":"/schedule","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-7","y":"skill","g":"Workflow & Meta","n":"/meeting-brief","d":"Generate a pre-meeting brief with attendee context and agenda preparation.","p":"Before a meeting, this pulls together everything you need \u2014 who's attending, their company background, past interactions, agenda items, and talking points. It's like having a prep assistant who briefs you in the elevator. Use it 10 minutes before any important meeting.","tg":["meeting","brief","preparation","attendees","context"],"cmd":"/meeting-brief","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-8","y":"skill","g":"Workflow & Meta","n":"/home-health-check","d":"Run a health check on home automation systems and network devices.","p":"This checks all your smart home devices and network equipment \u2014 are cameras online? Is the Wi-Fi mesh healthy? Are any sensors reporting issues? It's like a doctor visiting every device in your house and giving you a report. Use it when something seems off or as a weekly checkup.","tg":["home","health-check","network","smart-home","monitoring"],"cmd":"/home-health-check","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-9","y":"skill","g":"Workflow & Meta","n":"/claude-api","d":"Make direct Claude API calls for programmatic AI tasks.","p":"This sends requests directly to Claude's brain through the API \u2014 useful for batch processing, testing prompts, or building automated workflows that need AI responses without a human in the loop. It's the raw power behind the scenes. Use it for automation and programmatic AI tasks.","tg":["api","claude","programmatic","automation","backend"],"cmd":"/claude-api","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-10","y":"skill","g":"Workflow & Meta","n":"/next-best-practices","d":"Apply Next.js best practices for routing, data fetching, and performance.","p":"Next.js is a popular framework for building fast websites. This applies the official recommended patterns \u2014 how pages load data, how navigation works, how images optimize automatically. It's the difference between a website that's fine and one that's blazing fast. Use it when building or improving a Next.js site.","tg":["nextjs","best-practices","routing","performance","react"],"cmd":"/next-best-practices","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"s-wf-11","y":"skill","g":"Workflow & Meta","n":"/batch","d":"Process multiple items in batch mode for bulk operations.","p":"This processes a whole list of things at once instead of one at a time \u2014 like sending 50 emails, generating 30 images, or updating 100 database records. It's the difference between hand-delivering letters and using the post office. Use it whenever you have a list of things that all need the same treatment.","tg":["batch","bulk","processing","automation","scale"],"cmd":"/batch","ico":"\u26a1","bg":"#fef2f2","fg":"#991b1b"},{"id":"x-001","y":"tool","g":"Built-in Tools","n":"Read","d":"Reads files from disk into context.","p":"This lets Jarvis look at any file on your computer \u2014 code, images, PDFs, spreadsheets. Think of it like handing him a document to read. Use it whenever Jarvis needs to see what's inside a file before making changes.","tg":["file","read","context"],"cmd":"Read","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-002","y":"tool","g":"Built-in Tools","n":"Write","d":"Creates or overwrites a file on disk.","p":"This lets Jarvis create a brand-new file or completely replace an existing one. It's like telling him to write something from scratch on a blank page. Use it when you need a new file that didn't exist before.","tg":["file","write","create"],"cmd":"Write","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-003","y":"tool","g":"Built-in Tools","n":"Edit","d":"Makes surgical text replacements in existing files.","p":"Instead of rewriting a whole file, this swaps out just the lines that need to change. It's like using a pencil eraser on one sentence and writing a new one. Safer and faster than rewriting everything.","tg":["file","edit","replace"],"cmd":"Edit","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-004","y":"tool","g":"Built-in Tools","n":"Bash","d":"Runs terminal commands on your machine.","p":"This lets Jarvis type commands into the terminal just like you would \u2014 install software, run scripts, move files around. It's the most powerful tool because anything you can do in a terminal, Jarvis can do too.","tg":["terminal","command","shell"],"cmd":"Bash","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-005","y":"tool","g":"Built-in Tools","n":"Glob","d":"Finds files by name pattern across folders.","p":"This searches your entire project for files matching a pattern, like 'find me all .js files' or 'find anything named config.' It's like using the search bar in File Explorer but way faster and smarter.","tg":["search","files","pattern"],"cmd":"Glob","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-006","y":"tool","g":"Built-in Tools","n":"Grep","d":"Searches inside files for text or patterns.","p":"This looks inside every file for specific words or phrases. If Glob finds files by name, Grep finds files by what's written inside them. Use it when you know what something says but not where it lives.","tg":["search","content","regex"],"cmd":"Grep","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-007","y":"tool","g":"Built-in Tools","n":"Agent","d":"Spawns a sub-agent with its own context window.","p":"This creates a mini-Jarvis to handle a side task without cluttering the main conversation. It's like asking an assistant to go research something in another room and come back with just the answer.","tg":["agent","sub-agent","delegation"],"cmd":"Agent","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-008","y":"tool","g":"Built-in Tools","n":"WebFetch","d":"Fetches a URL and returns its content.","p":"This grabs the contents of any web page or API endpoint. It's like copying and pasting a webpage into the conversation. Use it when Jarvis needs to read documentation, check a live site, or pull data from the internet.","tg":["web","fetch","url"],"cmd":"WebFetch","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-009","y":"tool","g":"Built-in Tools","n":"WebSearch","d":"Searches the web and returns results.","p":"This lets Jarvis Google things for you. When he doesn't know something or needs current information, he can search the web and bring back the best results. Great for finding docs, tutorials, or recent news.","tg":["web","search","internet"],"cmd":"WebSearch","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-010","y":"tool","g":"Built-in Tools","n":"Task Create/Update","d":"Creates or updates tasks in a todo list.","p":"This lets Jarvis make a checklist of things to do and check them off as he works. It helps him stay organized on big projects with lots of steps, so nothing gets forgotten.","tg":["task","todo","tracking"],"cmd":"TaskCreate / TaskUpdate","ico":"\ud83d\udee0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-011","y":"tool","g":"CLI Tools","n":"Playwright CLI","d":"Browser automation and testing from the terminal.","p":"This controls a real web browser \u2014 clicking buttons, filling forms, taking screenshots \u2014 all automatically. Use it to test websites, scrape data, or verify that a page looks right after making changes.","tg":["browser","automation","testing"],"cmd":"npx playwright","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-012","y":"tool","g":"CLI Tools","n":"GitHub CLI (gh)","d":"Manage GitHub repos, PRs, and issues from terminal.","p":"This lets Jarvis do everything on GitHub without opening a browser \u2014 create pull requests, review code, manage issues, check build status. It's like having a GitHub power user on speed dial.","tg":["github","git","pr","issues"],"cmd":"gh","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-013","y":"tool","g":"CLI Tools","n":"Vercel CLI","d":"Deploy and manage Vercel projects from terminal.","p":"This pushes websites live to the internet with one command. When Jarvis finishes building a site, he can deploy it to Vercel so anyone can visit it. Also checks deployment status and manages domains.","tg":["deploy","vercel","hosting"],"cmd":"vercel","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-014","y":"tool","g":"CLI Tools","n":"yt-dlp","d":"Downloads videos and metadata from YouTube and other sites.","p":"This grabs videos, audio, thumbnails, or just the information about a video from YouTube and hundreds of other sites. Use it to download content for editing, research, or archiving.","tg":["youtube","download","video"],"cmd":"yt-dlp","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-015","y":"tool","g":"CLI Tools","n":"FFmpeg","d":"Converts, edits, and processes video/audio files.","p":"This is the Swiss Army knife for video and audio. It can convert formats, trim clips, add subtitles, combine files, compress videos, extract audio \u2014 basically anything you'd do in a video editor, but automated.","tg":["video","audio","convert","encode"],"cmd":"ffmpeg","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-016","y":"tool","g":"CLI Tools","n":"Supabase CLI","d":"Manage Supabase database and auth from terminal.","p":"This controls your Supabase database \u2014 create tables, run queries, manage users, push changes. It's like having a database admin tool built right into the terminal where Jarvis works.","tg":["database","supabase","backend"],"cmd":"supabase","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-017","y":"tool","g":"CLI Tools","n":"Codex CLI","d":"OpenAI's coding agent as a Claude Code plugin.","p":"This adds OpenAI's Codex as a second brain. Jarvis can ask Codex to review code from a different perspective, catch bugs he might miss, or take over tasks when Anthropic's servers are busy.","tg":["openai","codex","review"],"cmd":"npx claudecode-plugins add codex@openai","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-018","y":"tool","g":"CLI Tools","n":"Google Workspace CLI","d":"Control Gmail, Drive, Calendar, Sheets, Docs from terminal.","p":"This gives Jarvis access to your Google apps \u2014 read and send emails, manage calendar events, create spreadsheets, organize Drive files. It's like giving him the keys to your entire Google account.","tg":["google","gmail","drive","calendar"],"cmd":"gws","ico":"\ud83d\udcbb","bg":"#f3f4f6","fg":"#374151"},{"id":"x-019","y":"agent","g":"Sub-Agent Types","n":"general-purpose","d":"Default sub-agent for any delegated task.","p":"A basic helper agent that can do anything. Jarvis sends it a task, it works on it in its own space, and sends back the results. Like asking a coworker to handle something and report back.","tg":["agent","general","delegation"],"cmd":"Agent tool (default)","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-020","y":"agent","g":"Sub-Agent Types","n":"Explore","d":"Reads and maps codebases without making changes.","p":"This agent looks around your project to understand how it's built \u2014 what files exist, how they connect, what each part does. It never changes anything, just learns. Use it before making big changes.","tg":["explore","read-only","codebase"],"cmd":"Shift+Tab (plan mode)","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-021","y":"agent","g":"Sub-Agent Types","n":"Plan","d":"Creates detailed implementation plans before coding.","p":"This agent thinks through a problem step by step and writes out a plan before touching any code. It's like an architect drawing blueprints before construction starts. The plan gets your approval first.","tg":["planning","strategy","blueprint"],"cmd":"Shift+Tab x2","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-022","y":"agent","g":"Sub-Agent Types","n":"claude-code-guide","d":"Expert on Claude Code features and best practices.","p":"This agent knows everything about how Claude Code works \u2014 all the shortcuts, features, and tricks. Ask it when you're not sure how to do something or want to learn a new technique.","tg":["guide","help","documentation"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-023","y":"agent","g":"Sub-Agent Types","n":"codex:codex-rescue","d":"Falls back to OpenAI Codex when Claude is rate-limited.","p":"When Anthropic's servers are too busy and Jarvis hits rate limits, this agent switches to OpenAI's Codex to keep working. It's a backup brain so you never have to stop and wait.","tg":["codex","fallback","rate-limit"],"cmd":"codex:rescue","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-024","y":"agent","g":"Sub-Agent Types","n":"gsd-verifier","d":"Verifies that completed work meets requirements.","p":"This agent checks Jarvis's work after he's done. Did the code actually do what was asked? Are there bugs? Does it match the requirements? Like a quality inspector on a factory line.","tg":["verify","qa","testing"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-025","y":"agent","g":"Sub-Agent Types","n":"gsd-executor","d":"Executes planned tasks with focus and precision.","p":"This agent takes a plan and just does it \u2014 writes the code, makes the changes, runs the commands. No overthinking, no planning, just pure execution. The 'just get it done' agent.","tg":["execute","build","implement"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-026","y":"agent","g":"Sub-Agent Types","n":"gsd-planner","d":"Creates structured project plans with phases and tasks.","p":"This agent breaks big projects into smaller pieces with clear steps, timelines, and dependencies. It figures out what needs to happen first, second, third. Like a project manager making a Gantt chart.","tg":["planning","project","phases"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-027","y":"agent","g":"Sub-Agent Types","n":"gsd-debugger","d":"Diagnoses and fixes bugs in code.","p":"When something breaks, this agent hunts down the problem like a detective. It reads error messages, traces through code, finds the bug, and fixes it. The 'something is broken, please help' agent.","tg":["debug","fix","errors"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-028","y":"agent","g":"Sub-Agent Types","n":"gsd-phase-researcher","d":"Deep-dives into a specific project phase or topic.","p":"This agent does focused research on one part of your project \u2014 maybe a specific technology, library, or approach. It goes deep instead of wide, bringing back everything you need to know about that one thing.","tg":["research","deep-dive","phase"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-029","y":"agent","g":"Sub-Agent Types","n":"gsd-ui-researcher","d":"Researches UI/UX patterns and design systems.","p":"This agent studies how great apps look and work \u2014 what colors they use, how buttons are laid out, what makes a design feel professional. It brings back design inspiration and recommendations.","tg":["ui","ux","design","research"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-030","y":"agent","g":"Sub-Agent Types","n":"gsd-ui-auditor","d":"Audits UI for accessibility, consistency, and quality.","p":"This agent looks at your website or app and points out problems \u2014 buttons that are hard to read, colors that don't match, things that would confuse a user. Like hiring a design critic to review your work.","tg":["ui","audit","accessibility"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-031","y":"agent","g":"Sub-Agent Types","n":"gsd-roadmapper","d":"Creates strategic roadmaps and feature prioritization.","p":"This agent looks at the big picture \u2014 what should we build next? What matters most? It creates a roadmap that puts the most important features first and plans out weeks or months ahead.","tg":["roadmap","strategy","prioritization"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-032","y":"agent","g":"Sub-Agent Types","n":"gsd-codebase-mapper","d":"Maps the entire codebase structure and dependencies.","p":"This agent creates a map of your entire project \u2014 every file, every connection, every dependency. It's like making a blueprint of a building so you know exactly where everything is before renovating.","tg":["codebase","mapping","architecture"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-033","y":"agent","g":"Sub-Agent Types","n":"gsd-assumptions-analyzer","d":"Identifies hidden assumptions in plans or code.","p":"This agent plays devil's advocate. It looks at your plan and asks 'but what if this isn't true?' It finds the things everyone took for granted that could cause problems later.","tg":["assumptions","risk","analysis"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-034","y":"agent","g":"Sub-Agent Types","n":"gsd-advisor-researcher","d":"Researches best practices and expert recommendations.","p":"This agent looks up what the experts say \u2014 official documentation, best practices, proven patterns. When you're not sure how to do something the right way, this agent finds out for you.","tg":["advisor","best-practices","research"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-035","y":"agent","g":"Sub-Agent Types","n":"gsd-project-researcher","d":"Researches external projects, competitors, or references.","p":"This agent studies other projects similar to yours \u2014 what they did well, what they got wrong, and what you can learn from them. Great for competitive analysis or finding inspiration.","tg":["project","competitive","research"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-036","y":"agent","g":"Sub-Agent Types","n":"gsd-research-synthesizer","d":"Combines research from multiple agents into a summary.","p":"When several research agents each bring back findings, this agent reads all of them and writes one clean summary. It removes duplicates, highlights the most important points, and makes it easy to digest.","tg":["synthesis","summary","consolidation"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-037","y":"agent","g":"Sub-Agent Types","n":"gsd-plan-checker","d":"Reviews plans for completeness and feasibility.","p":"This agent reads a plan and asks 'Is this actually going to work?' It checks for missing steps, unrealistic timelines, and things that could go wrong. Like a second opinion before committing to a plan.","tg":["review","plan","validation"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-038","y":"agent","g":"Sub-Agent Types","n":"gsd-ui-checker","d":"Checks UI implementation against design specs.","p":"This agent compares what was built to what was designed. Does the button match the mockup? Are the colors right? Is the spacing correct? It catches the little visual differences humans might miss.","tg":["ui","comparison","design-spec"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-039","y":"agent","g":"Sub-Agent Types","n":"gsd-nyquist-auditor","d":"Audits system performance and resource usage.","p":"This agent checks if your system is healthy \u2014 is it using too much memory? Are things running slowly? Are there bottlenecks? Like a doctor checking vital signs to make sure everything is running smoothly.","tg":["performance","audit","resources"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-040","y":"agent","g":"Sub-Agent Types","n":"gsd-integration-checker","d":"Verifies integrations between systems work correctly.","p":"This agent tests that different parts of your system talk to each other properly. Does the website connect to the database? Does the email system send correctly? It finds broken connections.","tg":["integration","testing","connections"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-041","y":"agent","g":"Sub-Agent Types","n":"gsd-user-profiler","d":"Analyzes user behavior and preferences.","p":"This agent studies how people use your product \u2014 what they click, where they get stuck, what they like. It helps you understand your users so you can build things they actually want.","tg":["user","profiling","behavior"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-042","y":"agent","g":"Sub-Agent Types","n":"statusline-setup","d":"Configures the terminal status bar display.","p":"This agent sets up the information bar at the bottom of your terminal \u2014 showing things like current model, token usage, and session status. It's cosmetic but helps you keep track of what's happening.","tg":["terminal","status","display"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-043","y":"agent","g":"Sub-Agent Types","n":"gsd-executor (inline)","d":"Executes tasks inline without spawning a sub-process.","p":"Same as the regular executor but runs right here in the current conversation instead of in a separate window. Faster for small tasks because there's no overhead of starting a new session.","tg":["execute","inline","fast"],"cmd":"","ico":"\ud83e\udd16","bg":"#f0fdfa","fg":"#115e59"},{"id":"x-044","y":"feature","g":"Power Features","n":"Mobile App","d":"Control Claude Code from your phone.","p":"You can use Claude Code from your phone while you're away from your computer. Start a task on your PC, then check on it or give instructions from anywhere. Gr
