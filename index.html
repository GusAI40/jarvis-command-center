<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jarvis Command Center — TAG AI</title>
<style>
:root{--bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;--nv:#1e3a5f;--nv2:#0f172a;--gr:#166534;--bl:#1e40af;--am:#92400e;--rd:#991b1b;--tl:#115e59;--gy:#475569;--bdr:#e2e8f0;--bdr2:#cbd5e1;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 12px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',system-ui,Roboto,sans-serif;background:var(--bg);color:#1e293b;line-height:1.5;overflow:hidden;height:100vh}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:224px;height:100vh;background:var(--nv2);color:#e2e8f0;display:flex;flex-direction:column;z-index:100;transition:transform .2s}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.sidebar-header .subtitle{font-size:11px;color:#94a3b8;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.nav-section{padding:12px 12px 4px;font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px}
.nav-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 12px);margin:1px 6px;padding:7px 10px;border:none;background:transparent;color:#cbd5e1;font-size:12.5px;border-radius:6px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(59,130,246,.2);color:#60a5fa;font-weight:600}
.nav-btn .ico{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.nav-btn .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-btn .count{font-size:10px;color:#64748b;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:10px;min-width:22px;text-align:center}
.nav-btn.active .count{color:#60a5fa;background:rgba(59,130,246,.15)}

/* Top bar */
.topbar{position:fixed;top:0;left:224px;right:0;height:56px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:90}
.search-box{flex:1;max-width:480px;position:relative}
.search-box input{width:100%;height:38px;padding:0 14px 0 38px;border:1.5px solid var(--bdr);border-radius:var(--radius);font-size:13.5px;background:var(--bg2);transition:all .2s;outline:none;font-family:inherit}
.search-box input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.search-box .search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;pointer-events:none}
.topbar-stats{display:flex;gap:16px;font-size:12px;color:var(--gy)}
.topbar-stats span{display:flex;align-items:center;gap:4px}
.topbar-stats .num{font-weight:700;color:var(--nv)}
.topbar-hint{font-size:11px;color:#94a3b8;margin-left:auto}
.topbar-hint kbd{background:var(--bg3);border:1px solid var(--bdr);padding:1px 5px;border-radius:3px;font-size:10px;font-family:inherit}
.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--nv);padding:4px}

/* Main */
.main{margin-left:224px;margin-top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:20px 24px 40px}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.group-title{font-size:13px;font-weight:700;color:var(--nv);text-transform:uppercase;letter-spacing:.6px;margin:28px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--bdr);display:flex;align-items:center;gap:8px}
.group-title:first-child{margin-top:0}
.group-title .g-count{font-size:10px;font-weight:500;color:var(--gy);background:var(--bg3);padding:2px 8px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:8px}

/* Cards */
.card{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--bdr2);box-shadow:var(--shadow2);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:13.5px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:var(--gy);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:2px}
.card-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.b-skill{background:#dcfce7;color:var(--gr)}
.b-mcp{background:#fee2e2;color:var(--rd)}
.b-api{background:#dbeafe;color:var(--bl)}
.b-agent{background:#ccfbf1;color:var(--tl)}
.b-tool{background:#f1f5f9;color:var(--gy)}
.b-workflow{background:#fef3c7;color:var(--am)}
.b-video{background:#fef3c7;color:var(--am)}
.b-feature{background:#e0e7ff;color:#3730a3}
.b-shortcut{background:#f5f3ff;color:#6d28d9}
.b-technique{background:#dbeafe;color:var(--bl)}
.tag{font-size:10px;color:#94a3b8;background:var(--bg2);padding:1px 6px;border-radius:4px}

/* Status dot */
.status-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:14px;right:14px}
.status-dot.live{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
.status-dot.installed{background:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.status-dot.dead{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.15)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 6px rgba(34,197,94,.05)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:28px;position:relative}
.modal::-webkit-scrollbar{width:6px}
.modal::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gy);padding:4px 8px;border-radius:4px;line-height:1}
.modal-close:hover{background:var(--bg3)}
.modal h2{font-size:18px;font-weight:700;color:var(--nv2);margin-bottom:4px;padding-right:32px}
.modal .detail-desc{font-size:14px;color:var(--gy);margin:8px 0 12px;line-height:1.6}
.modal .detail-plain{font-size:13px;color:#334155;background:var(--bg2);padding:12px 16px;border-radius:var(--radius);line-height:1.6;margin-bottom:12px;border-left:3px solid #3b82f6}
.modal .detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.modal .detail-cmd{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:12.5px;background:var(--nv2);color:#e2e8f0;padding:8px 14px;border-radius:6px;margin-top:8px;display:inline-block;user-select:all;cursor:pointer}
.modal .detail-cmd:hover{background:#1e293b}
.modal .detail-cmd::after{content:' (click to copy)';font-size:10px;color:#64748b;margin-left:8px}

/* No results */
.no-results{text-align:center;padding:60px 20px;color:var(--gy)}
.no-results .big-ico{font-size:48px;margin-bottom:12px}
.no-results h3{font-size:16px;color:#334155;margin-bottom:4px}

/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{left:0}
  .main{margin-left:0}
  .hamburger{display:block}
  .grid{grid-template-columns:1fr}
  .topbar-hint{display:none}
}
@media(min-width:769px) and (max-width:1024px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Jarvis Command Center</h1>
    <div class="subtitle">TAG AI • 447 capabilities</div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<!-- Top bar -->
<header class="topbar">
  <button class="hamburger" id="menuBtn" onclick="toggleSidebar()">☰</button>
  <div class="search-box">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Search skills, tools, MCPs, APIs..." autocomplete="off">
  </div>
  <div class="topbar-stats">
    <span>Showing <span class="num" id="showCount">447</span></span>
    <span>Groups <span class="num" id="groupCount">0</span></span>
  </div>
  <div class="topbar-hint"><kbd>/</kbd> to search &middot; <kbd>Esc</kbd> to close</div>
</header>

<!-- Main content -->
<main class="main" id="mainContent"></main>

<!-- Detail modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>

const C=[{"id":"s-001","y":"skill","g":"GSD Project Management","n":"/gsd:new-project","d":"Create a new project from scratch.","p":"This starts a brand new project from scratch. Jarvis will ask you questions about what you're building, research the best tools to use, and create a project plan with steps. Think of it like hiring a project manager who sets everything up for you.","tg":["project","create","init"],"cmd":"/gsd:new-project","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-002","y":"skill","g":"GSD Project Management","n":"/gsd:new-milestone","d":"Add a new milestone to the current project.","p":"This adds a big checkpoint to your project, like a finish line for one part of the work. You use it when you want to break your project into major pieces so you can track progress. Jarvis creates the milestone and organizes the tasks that belong to it.","tg":["milestone","create","planning"],"cmd":"/gsd:new-milestone","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-003","y":"skill","g":"GSD Project Management","n":"/gsd:discuss-phase","d":"Talk through a phase before planning it.","p":"This lets you have a conversation about a phase of work before committing to a plan. Jarvis will ask questions, surface risks, and help you think through the approach. Use it when you're not sure how to tackle something and want to brainstorm first.","tg":["discuss","brainstorm","phase"],"cmd":"/gsd:discuss-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-004","y":"skill","g":"GSD Project Management","n":"/gsd:plan-phase","d":"Create a detailed plan for a phase.","p":"This builds a step-by-step plan for one phase of your project. Jarvis breaks the work into small tasks, estimates effort, and organizes everything in order. Think of it like making a recipe before you start cooking.","tg":["plan","phase","tasks"],"cmd":"/gsd:plan-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-005","y":"skill","g":"GSD Project Management","n":"/gsd:execute-phase","d":"Start executing a planned phase.","p":"This tells Jarvis to start doing the actual work for a phase that's already been planned. He'll go through each task one by one, writing code, creating files, and building what was outlined in the plan. You watch and approve as he goes.","tg":["execute","build","run"],"cmd":"/gsd:execute-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-006","y":"skill","g":"GSD Project Management","n":"/gsd:research-phase","d":"Research before building a phase.","p":"This sends Jarvis on a research mission to figure out the best way to build something before any code is written. He'll look at your codebase, read documentation, and come back with recommendations. Use it when you're entering unfamiliar territory.","tg":["research","explore","learn"],"cmd":"/gsd:research-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-007","y":"skill","g":"GSD Project Management","n":"/gsd:verify-work","d":"Verify completed work meets requirements.","p":"This checks that the work Jarvis just finished actually does what it was supposed to do. He'll run tests, check for errors, and compare the result against the original requirements. Like a teacher grading homework before you turn it in.","tg":["verify","check","quality"],"cmd":"/gsd:verify-work","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-008","y":"skill","g":"GSD Project Management","n":"/gsd:validate-phase","d":"Validate an entire phase is complete and correct.","p":"This does a thorough check of an entire phase of work to make sure everything is done and nothing was missed. Jarvis reviews every task, runs all tests, and confirms the phase is truly complete. Use it before moving on to the next phase.","tg":["validate","phase","complete"],"cmd":"/gsd:validate-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-009","y":"skill","g":"GSD Project Management","n":"/gsd:add-tests","d":"Add tests for existing code.","p":"This tells Jarvis to write tests for code that already exists. Tests are like safety checks that make sure your code works correctly and doesn't break when you make changes later. Jarvis figures out what needs testing and writes the test files.","tg":["tests","quality","coverage"],"cmd":"/gsd:add-tests","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-010","y":"skill","g":"GSD Project Management","n":"/gsd:audit-uat","d":"Run a user acceptance test audit.","p":"This simulates a real user trying out your project to find problems before launch. Jarvis pretends to be a user, clicks through everything, and reports what's broken or confusing. It's like having a friend test your app and tell you what's wrong.","tg":["audit","uat","testing"],"cmd":"/gsd:audit-uat","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-011","y":"skill","g":"GSD Project Management","n":"/gsd:audit-milestone","d":"Audit a milestone for completeness.","p":"This reviews an entire milestone to check if all the work is truly done and meets quality standards. Jarvis goes through every phase and task in the milestone, flags anything incomplete, and gives you a report card. Use it before marking a milestone as finished.","tg":["audit","milestone","review"],"cmd":"/gsd:audit-milestone","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-012","y":"skill","g":"GSD Project Management","n":"/gsd:complete-milestone","d":"Mark a milestone as complete.","p":"This officially marks a milestone as done and locks it in. Jarvis does a final check, updates the project status, and moves you forward to the next milestone. Like turning in a finished chapter of a book.","tg":["complete","milestone","done"],"cmd":"/gsd:complete-milestone","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-013","y":"skill","g":"GSD Project Management","n":"/gsd:milestone-summary","d":"Get a summary of a milestone.","p":"This gives you a quick overview of where a milestone stands right now. Jarvis shows you what's done, what's in progress, and what's left. It's like checking the scoreboard in the middle of a game.","tg":["summary","milestone","status"],"cmd":"/gsd:milestone-summary","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-014","y":"skill","g":"GSD Project Management","n":"/gsd:progress","d":"Show overall project progress.","p":"This shows you a big-picture view of how your entire project is going. Jarvis counts up all the tasks, milestones, and phases and tells you what percentage is complete. Use it anytime you want a quick status update on the whole project.","tg":["progress","status","overview"],"cmd":"/gsd:progress","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-015","y":"skill","g":"GSD Project Management","n":"/gsd:stats","d":"Show project statistics and metrics.","p":"This gives you the numbers behind your project: how many tasks done, how long things took, how many phases are left. Think of it like looking at your fitness app stats but for your project instead of your steps.","tg":["stats","metrics","analytics"],"cmd":"/gsd:stats","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-016","y":"skill","g":"GSD Project Management","n":"/gsd:next","d":"Show the next task to work on.","p":"This tells you exactly what you should work on next. Jarvis looks at all your tasks, figures out what's most important and ready to go, and points you to it. Like asking a coach what drill to do next in practice.","tg":["next","task","priority"],"cmd":"/gsd:next","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-017","y":"skill","g":"GSD Project Management","n":"/gsd:do","d":"Execute the next task immediately.","p":"This tells Jarvis to just do the next task right now without asking questions. He picks the most important thing that's ready and starts working on it. Use it when you're in the zone and want to keep momentum going.","tg":["do","execute","action"],"cmd":"/gsd:do","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-018","y":"skill","g":"GSD Project Management","n":"/gsd:fast","d":"Execute quickly with minimal discussion.","p":"This is like /gsd:do but even faster. Jarvis skips all the planning talk and just gets to work immediately. Use it for small, simple tasks where you don't need a conversation about the approach. Just get it done.","tg":["fast","quick","execute"],"cmd":"/gsd:fast","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-019","y":"skill","g":"GSD Project Management","n":"/gsd:quick","d":"Quick one-off task outside the project plan.","p":"This lets you do a quick side task that isn't part of your main project plan. Jarvis handles it right away without affecting your project milestones or phases. Like asking someone to grab you a coffee while they're working on a big report.","tg":["quick","adhoc","oneoff"],"cmd":"/gsd:quick","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-020","y":"skill","g":"GSD Project Management","n":"/gsd:autonomous","d":"Run tasks autonomously without prompts.","p":"This puts Jarvis in full autopilot mode. He works through tasks on his own without stopping to ask you questions, making decisions as he goes. Use it when you trust the plan and want to step away while work gets done.","tg":["autonomous","autopilot","hands-off"],"cmd":"/gsd:autonomous","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-021","y":"skill","g":"GSD Project Management","n":"/gsd:add-phase","d":"Add a new phase to a milestone.","p":"This adds a new section of work to an existing milestone. A phase is a group of related tasks, like 'Design the homepage' or 'Set up the database.' Jarvis creates the phase and gets it ready for planning.","tg":["phase","add","organize"],"cmd":"/gsd:add-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-022","y":"skill","g":"GSD Project Management","n":"/gsd:insert-phase","d":"Insert a phase at a specific position.","p":"This adds a new phase but lets you choose exactly where it goes in the order. Use it when you realize you need to add a step between two existing phases, like squeezing in a review step between building and launching.","tg":["phase","insert","reorder"],"cmd":"/gsd:insert-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-023","y":"skill","g":"GSD Project Management","n":"/gsd:remove-phase","d":"Remove a phase from a milestone.","p":"This deletes a phase that's no longer needed. Maybe the work got done another way, or the requirement changed. Jarvis removes it cleanly and adjusts the remaining phases so everything still flows correctly.","tg":["phase","remove","delete"],"cmd":"/gsd:remove-phase","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-024","y":"skill","g":"GSD Project Management","n":"/gsd:plan-milestone-gaps","d":"Find gaps in milestone planning.","p":"This scans your milestone for things that are missing or not well thought out. Jarvis looks for tasks that have no clear plan, dependencies that don't connect, or requirements that nobody addressed. Like proofreading your plan before you start building.","tg":["gaps","analysis","planning"],"cmd":"/gsd:plan-milestone-gaps","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-025","y":"skill","g":"GSD Project Management","n":"/gsd:add-todo","d":"Add a quick to-do item.","p":"This adds a simple task to your to-do list without creating a whole phase or milestone around it. Use it for small things you want to remember, like 'fix that typo' or 'update the color on the button.' Quick and easy.","tg":["todo","task","quick"],"cmd":"/gsd:add-todo","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-026","y":"skill","g":"GSD Project Management","n":"/gsd:check-todos","d":"Review all pending to-do items.","p":"This shows you all the small tasks you've added that haven't been done yet. Jarvis lists them out so you can decide which ones to tackle, skip, or delete. Like checking your sticky notes on the fridge.","tg":["todo","review","pending"],"cmd":"/gsd:check-todos","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-027","y":"skill","g":"GSD Project Management","n":"/gsd:add-backlog","d":"Add an item to the project backlog.","p":"This saves an idea or task for later without putting it in the active plan. The backlog is like a parking lot for ideas you don't want to forget but aren't ready to work on yet. Jarvis stores it so you can come back to it.","tg":["backlog","idea","later"],"cmd":"/gsd:add-backlog","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-028","y":"skill","g":"GSD Project Management","n":"/gsd:review-backlog","d":"Review and prioritize backlog items.","p":"This pulls up all the ideas and tasks you've saved for later and helps you decide what to do with them. Jarvis shows each item and you can promote it to active work, keep it parked, or delete it. Spring cleaning for your ideas.","tg":["backlog","review","prioritize"],"cmd":"/gsd:review-backlog","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-029","y":"skill","g":"GSD Project Management","n":"/gsd:note","d":"Add a note to the project context.","p":"This saves a note or thought attached to your project. Use it to record decisions, reminders, or context that Jarvis should remember for later sessions. Like writing in the margins of a textbook so you remember why you did something.","tg":["note","context","remember"],"cmd":"/gsd:note","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-030","y":"skill","g":"GSD Project Management","n":"/gsd:plant-seed","d":"Plant a seed idea for future exploration.","p":"This saves a rough idea that isn't ready for planning yet. Maybe it's a feature you thought of in the shower or a 'what if' moment. Jarvis stores it as a seed so it can grow into a real task later when the time is right.","tg":["seed","idea","future"],"cmd":"/gsd:plant-seed","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-031","y":"skill","g":"GSD Project Management","n":"/gsd:list-phase-assumptions","d":"List assumptions made during phase planning.","p":"This shows you all the things Jarvis assumed while planning a phase. Assumptions are guesses that could be wrong, like 'the API will respond in under 2 seconds' or 'the user has an account.' Reviewing them helps catch problems early before they surprise you.","tg":["assumptions","risk","planning"],"cmd":"/gsd:list-phase-assumptions","ico":"\ud83c\udfaf","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-032","y":"skill","g":"GSD DevOps","n":"/gsd:debug","d":"Debug an issue in the codebase.","p":"This tells Jarvis to hunt down a bug in your code. You describe what's going wrong and he investigates, reads error messages, traces the problem, and suggests or applies a fix. Like calling a mechanic when your car makes a weird noise.","tg":["debug","fix","error"],"cmd":"/gsd:debug","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-033","y":"skill","g":"GSD DevOps","n":"/gsd:forensics","d":"Deep investigation of a complex issue.","p":"This is a deep-dive investigation for really tricky bugs that simple debugging can't solve. Jarvis digs through logs, traces execution paths, and reconstructs what happened step by step. Use it when something broke and nobody knows why.","tg":["forensics","investigate","deep-dive"],"cmd":"/gsd:forensics","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-034","y":"skill","g":"GSD DevOps","n":"/gsd:ship","d":"Prepare and ship code to production.","p":"This packages up your code and gets it ready to go live. Jarvis runs final checks, creates a commit, and pushes everything to your repository. Like putting your finished product in a box and sending it to the store shelves.","tg":["ship","deploy","release"],"cmd":"/gsd:ship","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-035","y":"skill","g":"GSD DevOps","n":"/gsd:pr-branch","d":"Create a pull request branch.","p":"This creates a separate copy of your code (a branch) and opens a pull request so someone can review your changes before they go live. It's like writing a draft of an essay and asking a teacher to check it before you submit the final version.","tg":["pr","branch","git"],"cmd":"/gsd:pr-branch","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-036","y":"skill","g":"GSD DevOps","n":"/gsd:review","d":"Review code changes.","p":"This has Jarvis review code that was recently written or changed. He reads through it looking for bugs, bad patterns, security issues, and ways to make it better. Like having a senior developer look over your shoulder and give feedback.","tg":["review","code","quality"],"cmd":"/gsd:review","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-037","y":"skill","g":"GSD DevOps","n":"/gsd:map-codebase","d":"Map the entire codebase structure.","p":"This scans your entire project and creates a map of how all the files and folders are organized, what each piece does, and how they connect to each other. Use it when you're starting on a new project or need to understand a codebase you haven't seen before.","tg":["map","codebase","architecture"],"cmd":"/gsd:map-codebase","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-038","y":"skill","g":"GSD DevOps","n":"/gsd:health","d":"Check project health and code quality.","p":"This runs a health check on your project, looking at code quality, test coverage, outdated dependencies, and potential problems. Jarvis gives you a report card with grades and recommendations. Like taking your car in for an inspection.","tg":["health","quality","check"],"cmd":"/gsd:health","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-039","y":"skill","g":"GSD DevOps","n":"/gsd:resume-work","d":"Resume work from where you left off.","p":"This picks up exactly where your last session ended. Jarvis reads the project state, remembers what was in progress, and continues working on it. Use it at the start of every new session so you don't lose momentum or repeat work.","tg":["resume","continue","session"],"cmd":"/gsd:resume-work","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-040","y":"skill","g":"GSD DevOps","n":"/gsd:pause-work","d":"Pause and save current work state.","p":"This saves a snapshot of everything Jarvis is working on so you can come back to it later. He documents where he stopped, what's done, and what's next. Like putting a bookmark in a book before you close it.","tg":["pause","save","state"],"cmd":"/gsd:pause-work","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-041","y":"skill","g":"GSD DevOps","n":"/gsd:session-report","d":"Generate a report for the current session.","p":"This creates a summary of everything that happened during this work session. Jarvis lists what was built, what changed, any decisions made, and what's left to do. Great for keeping a record of progress or sharing updates with others.","tg":["report","session","summary"],"cmd":"/gsd:session-report","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-042","y":"skill","g":"GSD DevOps","n":"/gsd:thread","d":"Start a focused conversation thread.","p":"This starts a dedicated conversation about one specific topic without mixing it into your main project work. Use it when you want to discuss something in depth, like debating an architecture decision, without cluttering the main session.","tg":["thread","focus","conversation"],"cmd":"/gsd:thread","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-043","y":"skill","g":"GSD DevOps","n":"/gsd:cleanup","d":"Clean up project files and code.","p":"This tidies up your project by removing unused files, fixing formatting, organizing imports, and deleting temporary stuff that built up during development. Like cleaning your room after a big arts and crafts project.","tg":["cleanup","organize","tidy"],"cmd":"/gsd:cleanup","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-044","y":"skill","g":"GSD DevOps","n":"/gsd:settings","d":"View or change GSD settings.","p":"This lets you see and change how the GSD system is configured. You can adjust things like default behaviors, file locations, and preferences. Like going into the settings menu on your phone to customize how things work.","tg":["settings","config","preferences"],"cmd":"/gsd:settings","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-045","y":"skill","g":"GSD DevOps","n":"/gsd:set-profile","d":"Set or switch the active user profile.","p":"This sets who is using the system right now. Different profiles can have different preferences, permissions, and project access. Use it when switching between work contexts or when multiple people share the same setup.","tg":["profile","user","switch"],"cmd":"/gsd:set-profile","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-046","y":"skill","g":"GSD DevOps","n":"/gsd:update","d":"Update GSD to the latest version.","p":"This updates the GSD skill to its newest version with the latest features and fixes. Jarvis downloads the update and applies it to your setup. Like updating an app on your phone to get the newest features.","tg":["update","upgrade","version"],"cmd":"/gsd:update","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-047","y":"skill","g":"GSD DevOps","n":"/gsd:reapply-patches","d":"Reapply GSD patches after an update.","p":"This re-applies any custom changes you made to GSD after an update resets them. Sometimes updates overwrite your tweaks, and this command puts them back. Like re-hanging your pictures after the walls get repainted.","tg":["patches","reapply","fix"],"cmd":"/gsd:reapply-patches","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-048","y":"skill","g":"GSD DevOps","n":"/gsd:help","d":"Show GSD help and available commands.","p":"This shows you a list of every GSD command available and what each one does. Use it when you can't remember the name of a command or want to discover new features you haven't tried yet.","tg":["help","docs","reference"],"cmd":"/gsd:help","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-049","y":"skill","g":"GSD DevOps","n":"/gsd:join-discord","d":"Get the GSD Discord invite link.","p":"This gives you the link to join the GSD community Discord server where you can ask questions, share tips, and connect with other people using the same tools. Like getting an invite to a club for people who use GSD.","tg":["discord","community","support"],"cmd":"/gsd:join-discord","ico":"\ud83d\udd27","bg":"#f3f4f6","fg":"#374151"},{"id":"s-050","y":"skill","g":"GSD Workspaces","n":"/gsd:workstreams","d":"View all active workstreams.","p":"This shows you all the different streams of work happening at the same time. Each workstream is a separate track of tasks that can run in parallel. Use it to see the full picture of everything in flight across your projects.","tg":["workstreams","overview","parallel"],"cmd":"/gsd:workstreams","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-051","y":"skill","g":"GSD Workspaces","n":"/gsd:new-workspace","d":"Create a new workspace.","p":"This creates a brand new workspace, which is like a separate desk for a different project. Each workspace keeps its own files, settings, and context separate from your other work. Use it when you're starting something totally new.","tg":["workspace","create","new"],"cmd":"/gsd:new-workspace","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-052","y":"skill","g":"GSD Workspaces","n":"/gsd:list-workspaces","d":"List all available workspaces.","p":"This shows you every workspace you've created. You can see which ones are active, which have recent work, and switch between them. Like looking at all the tabs open in your browser to find the one you need.","tg":["workspace","list","browse"],"cmd":"/gsd:list-workspaces","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-053","y":"skill","g":"GSD Workspaces","n":"/gsd:remove-workspace","d":"Remove a workspace.","p":"This deletes a workspace you no longer need. Jarvis cleans up the workspace files and removes it from your list. Use it when a project is completely finished or you created a workspace by accident.","tg":["workspace","remove","delete"],"cmd":"/gsd:remove-workspace","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-054","y":"skill","g":"GSD Workspaces","n":"/gsd:manager","d":"Open the workspace manager.","p":"This opens a management view where you can organize, configure, and switch between all your workspaces. Think of it like a control panel or dashboard where you manage all your different projects from one place.","tg":["manager","dashboard","organize"],"cmd":"/gsd:manager","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-055","y":"skill","g":"GSD Workspaces","n":"/gsd:profile-user","d":"View or edit the user profile for this workspace.","p":"This shows you the user profile settings for the current workspace, like your name, role, and preferences. You can edit these so Jarvis knows how to tailor his work to you in this specific workspace.","tg":["profile","user","settings"],"cmd":"/gsd:profile-user","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-056","y":"skill","g":"GSD Workspaces","n":"/gsd:ui-phase","d":"Plan and execute a UI design phase.","p":"This starts a design-focused phase of work where Jarvis builds user interface components. He plans the layout, picks components, and builds the visual pieces of your app. Use it when you need to create or redesign screens and pages.","tg":["ui","design","frontend"],"cmd":"/gsd:ui-phase","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-057","y":"skill","g":"GSD Workspaces","n":"/gsd:ui-review","d":"Review UI implementation against design specs.","p":"This has Jarvis compare what was built on screen against the original design specs. He takes screenshots, checks spacing, colors, fonts, and layout to make sure the UI matches what was planned. Like holding up a painting next to the reference photo.","tg":["ui","review","design-qa"],"cmd":"/gsd:ui-review","ico":"\ud83d\udccb","bg":"#f0fdfa","fg":"#115e59"},{"id":"s-058","y":"skill","g":"Salesforce","n":"/sf-login","d":"Log in to Salesforce.","p":"This connects Jarvis to your Salesforce account so he can read and write data there. You need to run this before any other Salesforce commands will work. Like logging into your email before you can send messages.","tg":["salesforce","login","auth"],"cmd":"/sf-login","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-059","y":"skill","g":"Salesforce","n":"/sf-unified-search","d":"Search across all Salesforce objects.","p":"This searches your entire Salesforce database for anything matching your query. It looks across accounts, contacts, leads, opportunities, and everything else at once. Like using the search bar in Gmail but for your entire CRM.","tg":["salesforce","search","query"],"cmd":"/sf-unified-search","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-060","y":"skill","g":"Salesforce","n":"/sf-address-search","d":"Search Salesforce by address.","p":"This finds records in Salesforce by street address, city, or zip code. Use it when a customer calls and gives you their address instead of their name, or when you need to find all accounts in a specific area.","tg":["salesforce","address","location"],"cmd":"/sf-address-search","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-061","y":"skill","g":"Salesforce","n":"/sf-create-lead","d":"Create a new lead in Salesforce.","p":"This creates a brand new lead record in Salesforce with the contact information you provide. A lead is a potential customer who hasn't bought anything yet. Jarvis fills in all the right fields and saves it to your CRM.","tg":["salesforce","lead","create"],"cmd":"/sf-create-lead","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-062","y":"skill","g":"Salesforce","n":"/sf-create-opportunity","d":"Create a new opportunity in Salesforce.","p":"This creates an opportunity record, which represents a potential deal you're working on. Jarvis sets up the deal amount, stage, close date, and links it to the right account. Like opening a new folder for a deal you're trying to close.","tg":["salesforce","opportunity","deal"],"cmd":"/sf-create-opportunity","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-063","y":"skill","g":"Salesforce","n":"/sf-construction-job","d":"Create a construction job record.","p":"This creates a specialized construction job record in Salesforce with all the fields specific to construction projects like site location, permit info, and job scope. Use it when a new construction project comes in and needs to be tracked.","tg":["salesforce","construction","job"],"cmd":"/sf-construction-job","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-064","y":"skill","g":"Salesforce","n":"/sf-site-survey","d":"Create or update a site survey.","p":"This records the results of a site visit in Salesforce. When someone goes to check out a customer's location, this command saves what they found, including photos, equipment notes, and recommendations. Like filing a doctor's report after a checkup.","tg":["salesforce","survey","site"],"cmd":"/sf-site-survey","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-065","y":"skill","g":"Salesforce","n":"/sf-order-status","d":"Check the status of an order.","p":"This looks up an order in Salesforce and tells you exactly where it is in the process. You'll see if it's pending, in progress, shipped, or completed. Use it when a customer asks 'where's my order?' and you need a quick answer.","tg":["salesforce","order","status"],"cmd":"/sf-order-status","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-066","y":"skill","g":"Salesforce","n":"/sf-macd-order","d":"Create a move/add/change/disconnect order.","p":"This creates an MACD order, which is a request to change an existing service. M is move, A is add, C is change, D is disconnect. Use it when a customer wants to modify their current service instead of buying something new.","tg":["salesforce","macd","change"],"cmd":"/sf-macd-order","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-067","y":"skill","g":"Salesforce","n":"/sf-email-proposal","d":"Email a proposal from Salesforce.","p":"This sends a proposal email to a customer directly through Salesforce. Jarvis pulls the right contact info, attaches the proposal document, and sends it. The email gets logged automatically so your team can see it was sent.","tg":["salesforce","email","proposal"],"cmd":"/sf-email-proposal","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-068","y":"skill","g":"Salesforce","n":"/sf-financial-process","d":"Run financial processing on a deal.","p":"This handles the money side of a deal in Salesforce, like calculating commissions, processing payments, or generating invoices. Jarvis runs the financial steps in order so nothing gets missed. Like having an accountant process the paperwork for a closed deal.","tg":["salesforce","financial","billing"],"cmd":"/sf-financial-process","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-069","y":"skill","g":"Salesforce","n":"/sf-sale-complete","d":"Mark a sale as complete.","p":"This officially closes out a deal in Salesforce and marks it as won. Jarvis updates all the fields, moves the opportunity to 'Closed Won,' and triggers any post-sale workflows. Like ringing the bell when you close a big deal.","tg":["salesforce","close","won"],"cmd":"/sf-sale-complete","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-070","y":"skill","g":"Salesforce","n":"/sf-reject-handling","d":"Handle a rejected deal or order.","p":"This processes a deal or order that got rejected. Jarvis updates the status, logs the rejection reason, and triggers any follow-up steps like notifying the team or scheduling a retry. Like filing a returned package and figuring out what to do next.","tg":["salesforce","reject","handling"],"cmd":"/sf-reject-handling","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-071","y":"skill","g":"Salesforce","n":"/sf-batch","d":"Run batch operations in Salesforce.","p":"This runs the same action on many Salesforce records at once instead of one at a time. Use it when you need to update 50 leads, send emails to a list, or change a field on hundreds of records. Like stamping a whole stack of papers instead of signing each one.","tg":["salesforce","batch","bulk"],"cmd":"/sf-batch","ico":"\u2601","bg":"#eff6ff","fg":"#1e40af"},{"id":"s-072","y":"skill","g":"Codex","n":"/codex:setup","d":"Set up the Codex integration.","p":"This installs and configures the OpenAI Codex plugin so Jarvis can send code to a completely different AI model for a second opinion. You authenticate with your ChatGPT account and it's ready to go. Like setting up a phone line to call a second doctor.","tg":["codex","setup","install"],"cmd":"/codex:setup","ico":"\ud83d\udd0d","bg":"#f3f4f6","fg":"#374151"},{"id":"s-073","y":"skill","g":"Codex","n":"/codex:rescue","d":"Use Codex when Claude hits rate limits.","p":"This switches to OpenAI's Codex to keep working when Claude hits its usage limits and can't respond. Instead of waiting around, Jarvis sends the work to Codex so you don't lose momentum. Like calling an Uber when your car breaks down.","tg":["codex","rescue","fallback"],"cmd":"/codex:rescue","ico":"\ud83d\udd0d","bg":"#f3f4f6","fg":"#374151"},{"id":"s-074","y":"skill","g":"Codex","n":"/codex:gpt-5-4-prompting","d":"Use GPT-5/4 optimized prompting via Codex.","p":"This sends your prompt to Codex using prompting techniques specifically optimized for GPT-5 or GPT-4 models. Different AI models respond better to different styles of asking, and this makes sure you get the best results from OpenAI's models.","tg":["codex","gpt","prompting"],"cmd":"/codex:gpt-5-4-prompting","ico":"\ud83d\udd0d","bg":"#f3f4f6","fg":"#374151"},{"id":"s-075","y":"skill","g":"Codex","n":"/codex:codex-result-handling","d":"Process and integrate Codex results.","p":"This takes the results that came back from Codex and integrates them into your project. Jarvis compares what Codex suggested with what's already in the codebase and applies the changes cleanly. Like translating advice from one expert into your team's language.","tg":["codex","results","integrate"],"cmd":"/codex:codex-result-handling","ico":"\ud83d\udd0d","bg":"#f3f4f6","fg":"#374151"},{"id":"s-076","y":"skill","g":"Codex","n":"/codex:codex-cli-runtime","d":"Run Codex in CLI runtime mode.","p":"This launches Codex as a standalone command-line tool that can execute code and interact with your file system directly. It gives Codex full runtime access for tasks that need actual code execution, not just suggestions. Like giving the second doctor their own exam room.","tg":["codex","cli","runtime"],"cmd":"/codex:codex-cli-runtime","ico":"\ud83d\udd0d","bg":"#f3f4f6","fg":"#374151"},{"id":"m-001","y":"mcp","g":"MCP: Apollo","n":"apollo_search_people","d":"Search for people by name, title, company, or other filters.","p":"This finds real business contacts for you. Give it a job title like 'IT Director' and a location like 'Texas', and it pulls up actual people with their names, emails, and companies. Like a phone book for the business world.","tg":["contacts","search","prospecting"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-002","y":"mcp","g":"MCP: Apollo","n":"apollo_search_companies","d":"Search for companies by industry, size, location, or keywords.","p":"This finds businesses that match what you're looking for. You can search by things like industry, number of employees, or where they're located. Great for finding potential clients or researching competitors.","tg":["companies","search","prospecting"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-003","y":"mcp","g":"MCP: Apollo","n":"apollo_enrich_person","d":"Get detailed info about a specific person from their email or LinkedIn.","p":"Give it someone's email or LinkedIn URL, and it fills in everything else about them -- their job title, company, phone number, location, and more. Like running a background check but for business info.","tg":["contacts","enrichment","data"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-004","y":"mcp","g":"MCP: Apollo","n":"apollo_enrich_company","d":"Get detailed info about a specific company from its domain or name.","p":"Give it a company's website or name, and it tells you everything -- how many employees, what industry, their revenue, where they're headquartered. Like pulling up a company's baseball card with all their stats.","tg":["companies","enrichment","data"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-005","y":"mcp","g":"MCP: Apollo","n":"apollo_bulk_enrich_people","d":"Enrich multiple people at once with detailed contact and company info.","p":"Same as enriching one person, but you can do a whole list at once. Give it 50 emails and get back 50 full profiles with job titles, companies, and phone numbers. Saves hours of manual research.","tg":["contacts","enrichment","bulk"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-006","y":"mcp","g":"MCP: Apollo","n":"apollo_bulk_enrich_organizations","d":"Enrich multiple companies at once with detailed firmographic data.","p":"Same as enriching one company, but for a whole batch. Give it 50 company domains and get back 50 full profiles with employee counts, revenue, industry, and headquarters. Perfect for building prospect lists fast.","tg":["companies","enrichment","bulk"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-007","y":"mcp","g":"MCP: Apollo","n":"apollo_get_complete_organization_info","d":"Get a full profile of a company including contacts, tech stack, and news.","p":"This is the deep dive on a company. It pulls everything -- who works there, what technology they use, recent news, funding rounds, and more. Like reading a 10-page report about a company, but instant.","tg":["companies","research","deep-dive"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-008","y":"mcp","g":"MCP: Apollo","n":"apollo_get_organization_job_postings","d":"Get current job postings for a specific company.","p":"Shows you what jobs a company is hiring for right now. This tells you a lot -- if they're hiring IT staff, they might need new equipment. If they're growing fast, they might need your services. It's a sneaky-smart way to find sales opportunities.","tg":["companies","jobs","signals"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-009","y":"mcp","g":"MCP: Apollo","n":"apollo_search_news_articles","d":"Search for recent news articles about companies or industries.","p":"Finds recent news about a company or topic. Great for knowing what's happening before you reach out to someone -- like if they just got funding, won an award, or had a leadership change. Shows you're paying attention.","tg":["news","research","signals"],"ico":"\ud83d\udc65","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-010","y":"mcp","g":"MCP: HeyGen","n":"create_video_agent","d":"Create a video from a text prompt using AI to handle everything.","p":"You describe what you want the video to be about, and AI picks the avatar, writes the script, and produces the whole video for you. It's like telling a film crew 'make me a video about X' and they handle everything.","tg":["video","ai-generation","automated"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-011","y":"mcp","g":"MCP: HeyGen","n":"create_avatar_video","d":"Create a video with specific avatar, voice, and script choices.","p":"Unlike the auto mode, this lets YOU pick exactly which digital person appears, what voice they use, and what they say. It's like directing your own movie -- you control every detail of who's on screen and what they say.","tg":["video","avatar","custom"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-012","y":"mcp","g":"MCP: HeyGen","n":"create_video_translate","d":"Translate an existing video into another language with lip-sync.","p":"Takes a video and makes it look like the person is speaking a completely different language -- their lips even match the new words. Perfect for reaching clients who speak Spanish, French, or dozens of other languages.","tg":["video","translation","multilingual"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-013","y":"mcp","g":"MCP: HeyGen","n":"text_to_speech","d":"Convert text into spoken audio using a chosen voice.","p":"Type out what you want someone to say, pick a voice, and it creates an audio file of that voice reading your text. Great for voiceovers, narration, or audio messages without needing a microphone.","tg":["audio","voice","tts"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-014","y":"mcp","g":"MCP: HeyGen","n":"list_audio_voices","d":"List all available voices for text-to-speech.","p":"Shows you every voice you can use -- male, female, different accents, different languages. Like browsing a catalog of voice actors to find the perfect one for your video or audio project.","tg":["audio","voice","catalog"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-015","y":"mcp","g":"MCP: HeyGen","n":"list_videos","d":"List your videos with optional status and date filters.","p":"Shows all the videos you've created, like a library. You can filter by whether they're done processing, still rendering, or from a specific time period. Your personal video gallery.","tg":["video","library","management"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-016","y":"mcp","g":"MCP: HeyGen","n":"get_video","d":"Get details and download link for a specific video.","p":"Checks on a specific video -- is it done yet? Where can I download it? How long is it? Like tracking a package, but for your video. Once it's ready, you get a link to download or share it.","tg":["video","status","download"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-017","y":"mcp","g":"MCP: HeyGen","n":"delete_video","d":"Permanently delete a video from your account.","p":"Removes a video from your HeyGen account forever. Use this to clean up old videos you don't need anymore or ones that didn't turn out right. Once deleted, it's gone for good.","tg":["video","delete","management"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-018","y":"mcp","g":"MCP: HeyGen","n":"get_user_me","d":"Get your account info, remaining credits, and billing details.","p":"Shows how many video credits you have left, your account type, and billing info. Like checking your bank balance but for video-making credits. Helps you know how many more videos you can create.","tg":["account","billing","credits"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-019","y":"mcp","g":"MCP: HeyGen","n":"list_avatar_groups","d":"List all avatar groups available in your account.","p":"Shows the different collections of digital people you can use in your videos. Avatars are organized into groups -- like 'business professionals' or 'casual presenters'. Browse them to find the right look.","tg":["avatar","catalog","groups"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-020","y":"mcp","g":"MCP: HeyGen","n":"get_avatar_group","d":"Get details about a specific avatar group.","p":"Shows you all the digital people inside a specific group -- their names, what they look like, and what outfits they have. Like looking through a casting directory for a specific type of actor.","tg":["avatar","details","group"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-021","y":"mcp","g":"MCP: HeyGen","n":"list_avatar_looks","d":"List all available looks (outfits/poses) for avatars.","p":"Shows the different outfits and poses your digital people can wear. The same avatar can look professional in a suit or casual in a t-shirt. Pick the look that matches your video's vibe.","tg":["avatar","looks","customization"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-022","y":"mcp","g":"MCP: HeyGen","n":"get_avatar_look","d":"Get details about a specific avatar look.","p":"Shows you exactly what a specific avatar outfit or pose looks like -- the preview image, dimensions, and settings. Like zooming in on one outfit in the catalog before you commit to using it.","tg":["avatar","details","look"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-023","y":"mcp","g":"MCP: HeyGen","n":"list_video_translate_languages","d":"List all languages available for video translation.","p":"Shows every language you can translate your videos into. There are dozens -- Spanish, French, Mandarin, Arabic, and more. Check this before translating to make sure your target language is supported.","tg":["translation","languages","catalog"],"ico":"\ud83c\udfac","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-024","y":"mcp","g":"MCP: Mapbox","n":"search_and_geocode","d":"Convert an address or place name into map coordinates.","p":"Type in an address like '123 Main St, Dallas TX' and it gives you the exact spot on the map (latitude and longitude). This is how we place markers on maps and figure out exactly where things are located.","tg":["geocoding","search","location"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-025","y":"mcp","g":"MCP: Mapbox","n":"reverse_geocode","d":"Convert map coordinates into a human-readable address.","p":"The opposite of geocoding -- give it a spot on the map and it tells you the street address. Like dropping a pin on a map and asking 'what's the address here?' Useful for turning GPS coordinates into real addresses.","tg":["geocoding","reverse","location"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-026","y":"mcp","g":"MCP: Mapbox","n":"directions","d":"Get driving, walking, or cycling directions between locations.","p":"Works like Google Maps directions. Give it a starting point and destination, and it gives you the route, distance, and how long it takes. Can do driving, walking, or biking routes.","tg":["directions","routing","navigation"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-027","y":"mcp","g":"MCP: Mapbox","n":"matrix","d":"Calculate travel times between multiple locations at once.","p":"Figures out how long it takes to get from every point to every other point in a list. Like if you have 5 schools and want to know drive times between all of them -- it calculates all 25 combinations at once.","tg":["matrix","travel-time","multi-point"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-028","y":"mcp","g":"MCP: Mapbox","n":"optimization","d":"Find the fastest route visiting multiple stops.","p":"Like a delivery driver's best friend -- give it 10 stops and it figures out the smartest order to visit them all in the least time. No more zigzagging across town. Solves the 'traveling salesman' problem.","tg":["routing","optimization","multi-stop"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-029","y":"mcp","g":"MCP: Mapbox","n":"isochrone","d":"Show how far you can travel from a point in a given time.","p":"Draw a shape on the map showing everywhere you can reach in, say, 15 minutes of driving. Great for showing clients 'here's everything within a 10-minute drive of your house.' The shape looks like a blob around the starting point.","tg":["isochrone","drive-time","coverage"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-030","y":"mcp","g":"MCP: Mapbox","n":"category_search","d":"Search for nearby places by category like restaurants, schools, or parks.","p":"Find all the coffee shops, schools, hospitals, or parks near a location. Like asking 'what's around here?' and getting a list of places organized by type. Perfect for neighborhood research.","tg":["places","category","nearby"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-031","y":"mcp","g":"MCP: Mapbox","n":"place_details","d":"Get detailed info about a specific place or point of interest.","p":"Once you find a place, this gets you the details -- address, phone number, hours, ratings, and more. Like pulling up the full listing for a restaurant or business instead of just its name on the map.","tg":["places","details","poi"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-032","y":"mcp","g":"MCP: Mapbox","n":"static_map_image","d":"Generate a static map image with markers and overlays.","p":"Creates a picture of a map that you can put in a document, email, or presentation. You can add pins, draw lines, or highlight areas. Unlike an interactive map, this is just an image -- great for printing or attaching to emails.","tg":["map","image","static"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-033","y":"mcp","g":"MCP: Mapbox","n":"distance","d":"Calculate the straight-line distance between two points.","p":"Measures the distance between two spots on the map in a straight line (as the crow flies). Not a driving distance -- just how far apart two things are. Useful for quick 'how close is this?' checks.","tg":["distance","measurement","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-034","y":"mcp","g":"MCP: Mapbox","n":"bearing","d":"Calculate the compass direction from one point to another.","p":"Tells you what direction you'd face to look from point A toward point B. Like 'the school is northeast of the house.' Returns a compass bearing in degrees. Useful for orientation and spatial descriptions.","tg":["bearing","direction","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-035","y":"mcp","g":"MCP: Mapbox","n":"midpoint","d":"Find the exact middle point between two locations.","p":"Gives you the spot exactly halfway between two places. Like if you're meeting someone and want to find a restaurant in the middle. It calculates the geographic center between any two points.","tg":["midpoint","geometry","location"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-036","y":"mcp","g":"MCP: Mapbox","n":"destination","d":"Find a point at a given distance and direction from a starting point.","p":"Start at a location, pick a direction and distance, and it tells you where you'd end up. Like saying 'go 5 miles north of here -- what's there?' Useful for finding locations relative to a known point.","tg":["destination","geometry","projection"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-037","y":"mcp","g":"MCP: Mapbox","n":"area","d":"Calculate the area of a polygon on the map.","p":"Draws a shape on the map and tells you how big it is in square feet, acres, or square miles. Like measuring a property boundary, a school district, or a neighborhood to know its size.","tg":["area","measurement","polygon"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-038","y":"mcp","g":"MCP: Mapbox","n":"length","d":"Calculate the length of a line or path on the map.","p":"Measures how long a path is on the map -- like measuring a road, a trail, or the perimeter of a property. Gives you the total distance in miles, feet, or kilometers.","tg":["length","measurement","line"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-039","y":"mcp","g":"MCP: Mapbox","n":"centroid","d":"Find the center point of any shape on the map.","p":"Takes any shape drawn on a map and finds its exact center. Like finding the middle of a neighborhood, a property, or a service area. Useful for placing labels or markers at the center of things.","tg":["centroid","geometry","center"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-040","y":"mcp","g":"MCP: Mapbox","n":"buffer","d":"Create a zone around a point or shape at a given distance.","p":"Draws a bubble around something on the map. Like saying 'show me everything within 1 mile of this school.' It creates a circle (or shape) around your point that represents that buffer zone.","tg":["buffer","zone","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-041","y":"mcp","g":"MCP: Mapbox","n":"convex","d":"Create the smallest shape that wraps around a set of points.","p":"If you have a bunch of dots on a map, this draws the tightest possible shape that contains all of them. Like stretching a rubber band around pushpins on a bulletin board. Shows the outer boundary of a group of locations.","tg":["convex-hull","geometry","boundary"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-042","y":"mcp","g":"MCP: Mapbox","n":"simplify","d":"Reduce the complexity of a shape while keeping its general form.","p":"Takes a very detailed shape on the map and smooths it out, removing unnecessary zigzags while keeping the overall shape recognizable. Like tracing a rough outline instead of every tiny curve. Makes maps load faster.","tg":["simplify","geometry","optimization"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-043","y":"mcp","g":"MCP: Mapbox","n":"intersect","d":"Find the overlapping area between two shapes on the map.","p":"If you draw two shapes on a map, this shows you where they overlap. Like finding which neighborhoods are in BOTH a school district AND a flood zone. Only the area that's inside both shapes is returned.","tg":["intersect","geometry","overlap"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-044","y":"mcp","g":"MCP: Mapbox","n":"difference","d":"Subtract one shape from another on the map.","p":"Takes one shape and cuts out the part that overlaps with another shape. Like cookie-cutting -- if you have a circle and cut out a square from it, you get the leftover donut-like shape. Useful for exclusion zones.","tg":["difference","geometry","subtract"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-045","y":"mcp","g":"MCP: Mapbox","n":"union","d":"Merge two or more shapes into one combined shape.","p":"Takes multiple shapes on the map and merges them into one big shape. Like combining two overlapping circles into one blob. Useful for combining service areas, districts, or coverage zones into a single boundary.","tg":["union","geometry","merge"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-046","y":"mcp","g":"MCP: Mapbox","n":"point_in_polygon","d":"Check if a specific point falls inside a shape on the map.","p":"Answers a simple yes-or-no question: is this address inside this boundary? Like checking if a house is inside a school district, a city limit, or a service area. Drop a pin, draw a shape, get your answer.","tg":["containment","geometry","check"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-047","y":"mcp","g":"MCP: Mapbox","n":"points_within_polygon","d":"Find which points from a set fall inside a given shape.","p":"Give it a list of locations and a boundary, and it tells you which ones are inside. Like 'which of these 50 schools are inside this county?' Filters a list of places by whether they're in a specific area.","tg":["containment","filter","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-048","y":"mcp","g":"MCP: Mapbox","n":"nearest_point","d":"Find the closest point in a set to a given location.","p":"From a list of places, finds the one closest to where you are. Like 'which of our 20 clients is nearest to this address?' Useful for finding the closest school, office, or client site.","tg":["nearest","proximity","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-049","y":"mcp","g":"MCP: Mapbox","n":"nearest_point_on_line","d":"Find the closest spot on a road or path to a given point.","p":"Takes a road or path on the map and finds the spot on that road closest to a specific location. Like figuring out 'where on this highway is the nearest point to my house?' Useful for access point analysis.","tg":["nearest","line","geometry"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-050","y":"mcp","g":"MCP: Mapbox","n":"map_matching","d":"Snap GPS coordinates to the nearest actual roads.","p":"Takes messy GPS data (like from a phone tracking a drive) and cleans it up by snapping each point to the actual road it was on. Turns a wobbly line into a clean route that follows real streets.","tg":["gps","roads","matching"],"ico":"\ud83d\uddfa","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-051","y":"mcp","g":"MCP: Tavily","n":"tavily_search","d":"Search the internet with AI-powered understanding of your query.","p":"This searches the internet for you, but smarter than Google. Instead of matching keywords, it understands what you MEAN. So if you search 'companies that help schools with internet', it finds exactly that even if those words aren't on the page.","tg":["search","ai","web"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-052","y":"mcp","g":"MCP: Tavily","n":"tavily_research","d":"Conduct deep multi-step research on a topic with cited sources.","p":"Goes way deeper than a regular search. It reads multiple websites, connects the dots, and gives you a mini research report with sources cited. Like hiring a research assistant who reads 20 articles and summarizes the key findings.","tg":["research","deep-dive","citations"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-053","y":"mcp","g":"MCP: Tavily","n":"tavily_crawl","d":"Crawl a website and extract all its content systematically.","p":"Goes through a website page by page and pulls out all the text content. Like sending someone to read every page of a website and take notes. Great for analyzing a competitor's site or gathering info from a large resource.","tg":["crawl","scraping","content"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-054","y":"mcp","g":"MCP: Tavily","n":"tavily_extract","d":"Extract specific content from a URL with clean formatting.","p":"Grabs the text from a specific web page and cleans it up -- removes ads, menus, and junk so you get just the article or content. Like copying an article but only the important parts, perfectly formatted.","tg":["extract","content","cleanup"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-055","y":"mcp","g":"MCP: Tavily","n":"tavily_map","d":"Discover all pages and links on a website.","p":"Creates a map of every page on a website -- like a table of contents for the entire site. Shows you every page that exists and how they connect to each other. Useful for understanding a website's full structure.","tg":["sitemap","structure","discovery"],"ico":"\ud83d\udd0e","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-056","y":"mcp","g":"MCP: Playwright","n":"browser_navigate","d":"Open a URL in the automated browser.","p":"Opens a website in a browser that the AI controls. Like telling someone 'go to this website.' This is usually the first step before doing anything else on a web page -- you have to go there first.","tg":["browser","navigation","url"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-057","y":"mcp","g":"MCP: Playwright","n":"browser_snapshot","d":"Capture the current state of the page as structured text.","p":"Takes a snapshot of what's currently on the web page -- all the text, buttons, links, and form fields -- and organizes it into a readable format. Like reading the page with X-ray vision to see every element.","tg":["browser","snapshot","state"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-058","y":"mcp","g":"MCP: Playwright","n":"browser_take_screenshot","d":"Take a visual screenshot of the current page.","p":"Takes a picture of what the website looks like right now, just like if you pressed the screenshot button on your computer. Great for seeing how a page actually looks or saving visual proof of something.","tg":["browser","screenshot","visual"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-059","y":"mcp","g":"MCP: Playwright","n":"browser_click","d":"Click on a button, link, or element on the page.","p":"Clicks on something on the web page -- a button, a link, a menu item, anything clickable. Like having a robot finger that can press any button on any website for you.","tg":["browser","click","interaction"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-060","y":"mcp","g":"MCP: Playwright","n":"browser_fill_form","d":"Fill in a form field with text.","p":"Types text into a form field on a website -- like filling in your name, email, or a search box. It clears whatever was there before and types in the new text. Like having someone fill out forms for you.","tg":["browser","form","input"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-061","y":"mcp","g":"MCP: Playwright","n":"browser_type","d":"Type text character by character into a focused element.","p":"Types text one letter at a time, like a person actually typing on a keyboard. Some websites need this instead of pasting because they watch for real keystrokes. Slower but more realistic.","tg":["browser","typing","input"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-062","y":"mcp","g":"MCP: Playwright","n":"browser_press_key","d":"Press a keyboard key like Enter, Tab, or Escape.","p":"Presses a single key on the keyboard -- like hitting Enter to submit a form, Tab to move to the next field, or Escape to close a popup. Like having a robot hand on the keyboard.","tg":["browser","keyboard","key"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-063","y":"mcp","g":"MCP: Playwright","n":"browser_hover","d":"Hover the mouse over an element to trigger menus or tooltips.","p":"Moves the mouse cursor over something on the page without clicking. Some menus only appear when you hover over them, and some buttons change when you mouse over them. This triggers those hidden elements.","tg":["browser","hover","interaction"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-064","y":"mcp","g":"MCP: Playwright","n":"browser_select_option","d":"Select an option from a dropdown menu.","p":"Picks a choice from a dropdown list on a website. Like selecting your state from a list or choosing a category from a menu. Clicks the dropdown and selects the right option for you.","tg":["browser","dropdown","select"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-065","y":"mcp","g":"MCP: Playwright","n":"browser_evaluate","d":"Run JavaScript code on the current page.","p":"Runs custom code on the web page to do things that aren't possible with normal clicking. Like a superpower that lets you change things on the page, read hidden data, or automate complex actions that regular tools can't handle.","tg":["browser","javascript","advanced"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-066","y":"mcp","g":"MCP: Playwright","n":"browser_console_messages","d":"Read messages from the browser's developer console.","p":"Shows the behind-the-scenes messages that websites produce. If something is broken on a website, the error messages show up here. Like reading a website's diary to see what's going wrong or what it's doing.","tg":["browser","console","debugging"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-067","y":"mcp","g":"MCP: Playwright","n":"browser_network_requests","d":"Monitor network requests the page is making.","p":"Shows every request the website makes behind the scenes -- loading images, fetching data, talking to servers. Like seeing all the invisible deliveries happening while you browse. Useful for understanding how a site works.","tg":["browser","network","monitoring"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-068","y":"mcp","g":"MCP: Playwright","n":"browser_navigate_back","d":"Go back to the previous page in the browser.","p":"Clicks the back button in the browser, just like you would. Takes you to whatever page you were on before. Simple but essential when navigating through multiple pages of a website.","tg":["browser","navigation","back"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-069","y":"mcp","g":"MCP: Playwright","n":"browser_tabs","d":"List all open browser tabs.","p":"Shows you every tab that's currently open in the browser, with their titles and URLs. Like looking at all the tabs at the top of your browser to see what's open. Helps keep track when working with multiple pages.","tg":["browser","tabs","management"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-070","y":"mcp","g":"MCP: Playwright","n":"browser_close","d":"Close a browser tab or the entire browser.","p":"Closes a tab or shuts down the browser entirely. Like clicking the X button. Use this to clean up when you're done with a website or to close tabs you don't need anymore.","tg":["browser","close","cleanup"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-071","y":"mcp","g":"MCP: Playwright","n":"browser_resize","d":"Resize the browser window to specific dimensions.","p":"Changes the size of the browser window -- make it phone-sized, tablet-sized, or desktop-sized. This is how we test if a website looks good on different screen sizes without needing the actual devices.","tg":["browser","resize","responsive"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-072","y":"mcp","g":"MCP: Playwright","n":"browser_drag","d":"Drag an element from one position to another.","p":"Grabs something on the page and drags it somewhere else, like moving a slider, reordering items in a list, or dragging a file into an upload zone. Simulates the click-hold-and-move action.","tg":["browser","drag","interaction"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-073","y":"mcp","g":"MCP: Playwright","n":"browser_file_upload","d":"Upload a file to a website.","p":"Selects a file from your computer and uploads it to a website, like attaching a document to an email or uploading a photo to a form. Handles the 'choose file' dialog automatically.","tg":["browser","upload","file"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-074","y":"mcp","g":"MCP: Playwright","n":"browser_handle_dialog","d":"Handle popup dialogs like alerts, confirms, and prompts.","p":"Responds to those annoying popup boxes that websites sometimes show -- 'Are you sure?' or 'Enter your name.' It can click OK, Cancel, or type in a response automatically so the popup doesn't block everything.","tg":["browser","dialog","popup"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-075","y":"mcp","g":"MCP: Playwright","n":"browser_wait_for","d":"Wait for a specific element or condition on the page.","p":"Pauses and waits for something to appear on the page before continuing. Like waiting for a loading spinner to disappear or a button to become clickable. Prevents errors from trying to click things that haven't loaded yet.","tg":["browser","wait","timing"],"ico":"\ud83c\udf10","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-076","y":"mcp","g":"MCP: Figma","n":"get_design_context","d":"Get design details, code hints, and a screenshot from a Figma node.","p":"Pulls the design details from a specific part of a Figma file -- the colors, fonts, spacing, and even starter code. Like having a designer hand you a blueprint with notes on exactly how to build it.","tg":["design","context","code"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-077","y":"mcp","g":"MCP: Figma","n":"get_screenshot","d":"Take a screenshot of a Figma design or component.","p":"Takes a picture of any part of a Figma design. Like screenshotting a specific section of a design file so you can see exactly what it looks like. Useful for reviewing designs without opening Figma.","tg":["design","screenshot","visual"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-078","y":"mcp","g":"MCP: Figma","n":"get_metadata","d":"Get metadata about a Figma file like pages, components, and structure.","p":"Shows you the big picture of a Figma file -- how many pages it has, what components exist, and how everything is organized. Like looking at the table of contents of a design project.","tg":["design","metadata","structure"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-079","y":"mcp","g":"MCP: Figma","n":"get_figjam","d":"Read content from a FigJam whiteboard file.","p":"Pulls out all the sticky notes, text, shapes, and connections from a FigJam brainstorming board. Like reading everything on a whiteboard -- every note, every arrow, every diagram people drew during a meeting.","tg":["figjam","whiteboard","content"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-080","y":"mcp","g":"MCP: Figma","n":"generate_diagram","d":"Create a diagram in FigJam from a text description.","p":"Describe a diagram in words -- like 'show how data flows from the website to the database' -- and it creates a visual diagram in FigJam automatically. Turns ideas into visuals without you needing to draw anything.","tg":["figjam","diagram","generation"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-081","y":"mcp","g":"MCP: Figma","n":"generate_figma_design","d":"Create a new design in Figma from a text description.","p":"Describe what you want a design to look like -- 'a login page with a blue header and white card' -- and it creates it in Figma. Like having a designer who can read your mind and instantly produce mockups.","tg":["design","generation","ai"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-082","y":"mcp","g":"MCP: Figma","n":"create_new_file","d":"Create a new empty Figma or FigJam file.","p":"Creates a brand new blank Figma file for you to work in, like opening a fresh canvas. You can then add designs, diagrams, or whatever you need. It starts completely empty and ready to go.","tg":["design","file","create"],"ico":"\ud83d\udd8c","bg":"#fef2f2","fg":"#991b1b"},{"id":"m-083","y":"mcp","g":"MCP: Figma","n":"search_design_system","d":"Search your team's design system for components and styles.","p":"Searches through your team's library of pre-built design pieces -- buttons, forms, cards, icons. Like browsing a parts catalog to find the exact component you need instead of building it from scratch.","tg":["design-system","search","components"],"ico":"\ud83d\udd8c","bg":"#
