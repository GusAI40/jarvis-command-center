eat for monitoring long-running jobs.","tg":["mobile","remote","phone"],"cmd":"","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-045","y":"feature","g":"Power Features","n":"Teleport","d":"Move a conversation between devices instantly.","p":"If you started working on your desktop and need to leave, teleport moves the whole conversation to your phone or laptop. Nothing is lost \u2014 it picks up exactly where you left off.","tg":["teleport","sync","devices"],"cmd":"","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-046","y":"feature","g":"Power Features","n":"Remote Control","d":"Control your terminal session from another device.","p":"This turns your phone into a remote control for Claude Code running on your computer. You can type commands, approve changes, and monitor progress without being at your desk.","tg":["remote","control","mobile"],"cmd":"/remote-control","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-047","y":"feature","g":"Power Features","n":"Loop","d":"Run a task repeatedly on a schedule or condition.","p":"This makes Jarvis do something over and over \u2014 like checking a website every hour, or retrying a task until it works. Set it and forget it. The task runs automatically in the background.","tg":["loop","repeat","automation"],"cmd":"/loop","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-048","y":"feature","g":"Power Features","n":"Schedule","d":"Schedule tasks to run at specific times.","p":"Tell Jarvis to do something tomorrow at 6 AM, or every Monday morning. It's like setting an alarm clock but instead of waking you up, it starts a task automatically.","tg":["schedule","cron","timing"],"cmd":"/schedule","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-049","y":"feature","g":"Power Features","n":"Hooks","d":"Automatic actions triggered by events.","p":"Hooks are rules that say 'whenever X happens, do Y automatically.' Like 'every time Jarvis finishes editing a file, run the linter.' They enforce rules without you having to remember to ask.","tg":["hooks","automation","triggers"],"cmd":".claude/settings.json","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-050","y":"feature","g":"Power Features","n":"Cowork","d":"Claude Code with a visual UI instead of terminal.","p":"If the terminal feels intimidating, Cowork is the same Jarvis brain but with a friendly visual interface. Click buttons instead of typing commands. Built for people who prefer GUIs over terminals.","tg":["ui","visual","non-technical"],"cmd":"","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-051","y":"feature","g":"Power Features","n":"Chrome Extension","d":"Claude Code sees and interacts with your browser.","p":"This lets Jarvis see what's on your screen in Chrome. He can look at a website, take screenshots, fill in forms, and verify his work visually. Like giving him eyes to see what he's building.","tg":["chrome","browser","visual"],"cmd":"/config chrome","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-052","y":"feature","g":"Power Features","n":"Live Preview","d":"See changes in real-time as Claude edits.","p":"As Jarvis writes code, you can watch the website or app update in real time. No waiting for him to finish \u2014 you see every change as it happens, like watching someone paint.","tg":["preview","live","realtime"],"cmd":"","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-053","y":"feature","g":"Power Features","n":"Branch","d":"Fork the conversation to explore alternatives.","p":"This creates a copy of your conversation so you can try two different approaches. If one doesn't work out, you still have the other. Like saving your game before a boss fight.","tg":["branch","fork","alternatives"],"cmd":"/branch","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-054","y":"feature","g":"Power Features","n":"Side Questions","d":"Ask a quick question without derailing current work.","p":"If you have a quick question while Jarvis is in the middle of a big task, side questions let you ask without interrupting his flow. Like passing a note during a meeting \u2014 doesn't break the focus.","tg":["side","question","interrupt"],"cmd":"","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-055","y":"feature","g":"Power Features","n":"Worktrees","d":"Work on multiple branches simultaneously.","p":"This lets Jarvis work on several versions of your project at the same time in separate folders. One agent fixes a bug while another builds a feature \u2014 they don't interfere with each other.","tg":["git","worktree","parallel"],"cmd":"git worktree","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-056","y":"feature","g":"Power Features","n":"Batch","d":"Process multiple items in sequence automatically.","p":"Give Jarvis a list of things to do and he'll work through them one by one without you watching. Like dropping off a stack of forms at the office \u2014 they all get processed, you just pick them up when done.","tg":["batch","bulk","sequential"],"cmd":"/batch","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-057","y":"feature","g":"Power Features","n":"Bare Mode","d":"Run Claude Code without loading project context.","p":"This starts a clean session with no project files loaded \u2014 just raw Claude. Use it for quick questions, one-off tasks, or when you don't want Jarvis reading your whole project first.","tg":["bare","minimal","clean"],"cmd":"claude --bare","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-058","y":"feature","g":"Power Features","n":"Add Directory","d":"Give Claude access to additional folders.","p":"By default, Jarvis can only see the folder you started in. This lets you add more folders so he can work across multiple projects at once. Like giving him access to more filing cabinets.","tg":["directory","access","context"],"cmd":"/add-dir","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-059","y":"feature","g":"Power Features","n":"Custom Agents","d":"Create specialized agents with unique personas.","p":"Build your own mini-Jarvises with specific personalities and skills \u2014 a code reviewer, a designer, a researcher. Each one is optimized for its specific job and can be reused anytime.","tg":["custom","agent","persona"],"cmd":"/agents","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-060","y":"feature","g":"Power Features","n":"Voice Input","d":"Speak commands instead of typing them.","p":"Talk to Jarvis with your voice instead of typing. Just press the voice button and speak naturally. Great for when you're thinking out loud or when typing feels slow.","tg":["voice","speech","microphone"],"cmd":"/voice","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-061","y":"feature","g":"Power Features","n":"Ultraplan","d":"Cloud-powered multi-agent planning with 4 Opus agents.","p":"This sends your planning task to Anthropic's cloud where four separate AI agents work on it in parallel \u2014 three explore different approaches and one critiques them. Results come back 3x faster and more thorough than local planning.","tg":["ultraplan","cloud","planning","parallel"],"cmd":"/ultraplan","ico":"\ud83d\ude80","bg":"#ecfdf5","fg":"#166534"},{"id":"x-062","y":"shortcut","g":"Keyboard Shortcuts","n":"Enter","d":"Send your message to Claude.","p":"Press Enter to send whatever you've typed. Jarvis reads it and starts working. The most basic action \u2014 like pressing 'Send' on a text message.","tg":["send","submit","basic"],"cmd":"Enter","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-063","y":"shortcut","g":"Keyboard Shortcuts","n":"Shift+Tab","d":"Toggle plan mode (read-only, no edits).","p":"This switches Jarvis into 'thinking only' mode where he can look at files but can't change anything. Use it when you want him to study a problem before jumping into action.","tg":["plan","mode","read-only"],"cmd":"Shift+Tab","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-064","y":"shortcut","g":"Keyboard Shortcuts","n":"Shift+Tab x2","d":"Deep plan mode with extended thinking.","p":"Double-tap this to activate deep thinking mode. Jarvis spends more time reasoning through the problem before suggesting anything. Best for complex problems where the first answer might be wrong.","tg":["deep-plan","thinking","analysis"],"cmd":"Shift+Tab x2","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-065","y":"shortcut","g":"Keyboard Shortcuts","n":"Esc Esc","d":"Interrupt Claude and fork the conversation.","p":"Press Escape twice to stop Jarvis mid-sentence and create a save point. You can come back to this exact moment later. Like hitting pause and saving your progress in a game.","tg":["interrupt","fork","save"],"cmd":"Esc Esc","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-066","y":"shortcut","g":"Keyboard Shortcuts","n":"/clear","d":"Clear conversation and start fresh.","p":"Wipes the conversation clean so Jarvis starts with a blank slate. Use it when the conversation has gotten long and messy, or when you're switching to a totally different task.","tg":["clear","reset","fresh"],"cmd":"/clear","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-067","y":"shortcut","g":"Keyboard Shortcuts","n":"/model","d":"Switch between AI models (Sonnet, Opus, etc.).","p":"This lets you change which brain Jarvis uses. Sonnet is faster and cheaper; Opus is smarter and more thorough. Switch based on how hard the task is.","tg":["model","switch","selection"],"cmd":"/model","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-068","y":"shortcut","g":"Keyboard Shortcuts","n":"/config","d":"Open persistent settings for all sessions.","p":"This opens the settings menu where you can turn features on or off permanently. Changes apply to every future session, so you only set them once.","tg":["config","settings","persistent"],"cmd":"/config","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-069","y":"shortcut","g":"Keyboard Shortcuts","n":"/compact","d":"Compress conversation to save context space.","p":"When the conversation gets really long, this squeezes it down to save memory. The downside is some details get lost in the summary. Usually better to just /clear and start fresh.","tg":["compact","compress","context"],"cmd":"/compact","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-070","y":"shortcut","g":"Keyboard Shortcuts","n":"/cost","d":"Show token usage and estimated costs.","p":"This shows how much of Jarvis's brain you've used in this session \u2014 how many tokens consumed and what it would cost on an API plan. Helps you understand when the conversation is getting expensive.","tg":["cost","tokens","usage"],"cmd":"/cost","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-071","y":"shortcut","g":"Keyboard Shortcuts","n":"/help","d":"Show available commands and features.","p":"Stuck? Type this to see everything Jarvis can do. It lists all the slash commands, keyboard shortcuts, and features available. Like opening the help menu in any app.","tg":["help","commands","reference"],"cmd":"/help","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-072","y":"shortcut","g":"Keyboard Shortcuts","n":"/fast","d":"Switch to the faster, cheaper model.","p":"Instantly switches Jarvis to Sonnet, the quicker and less expensive model. Great for simple tasks where you don't need the extra brainpower of Opus.","tg":["fast","sonnet","speed"],"cmd":"/fast","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-073","y":"shortcut","g":"Keyboard Shortcuts","n":"/init","d":"Initialize project memory file.","p":"Creates a CLAUDE.md file that acts as Jarvis's memory for this project. He scans all your files and writes down what he learned. Every future session reads this file first, so he remembers.","tg":["init","memory","project"],"cmd":"/init","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-074","y":"shortcut","g":"Keyboard Shortcuts","n":"/voice","d":"Activate voice input mode.","p":"Turns on your microphone so you can talk to Jarvis instead of typing. Just speak naturally and he'll understand your instructions. Press again to stop listening.","tg":["voice","speech","input"],"cmd":"/voice","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-075","y":"shortcut","g":"Keyboard Shortcuts","n":"/plan","d":"Enter plan mode for current task.","p":"Tells Jarvis to make a plan before doing anything. He'll write out the steps, you approve or modify them, then he executes. Prevents wasted effort on the wrong approach.","tg":["plan","strategy","approval"],"cmd":"/plan","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-076","y":"shortcut","g":"Keyboard Shortcuts","n":"/ultraplan","d":"Launch cloud-powered deep planning.","p":"Sends your planning task to Anthropic's cloud where four AI agents work on it together. You get a polished plan with diagrams that you review on a web page before executing. The premium planning experience.","tg":["ultraplan","cloud","deep-plan"],"cmd":"/ultraplan","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-077","y":"shortcut","g":"Keyboard Shortcuts","n":"/branch","d":"Create a conversation branch.","p":"Splits your conversation into two paths so you can try different approaches. If one branch goes sideways, you still have the other one intact. Risk-free experimentation.","tg":["branch","fork","experiment"],"cmd":"/branch","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-078","y":"shortcut","g":"Keyboard Shortcuts","n":"/batch","d":"Process a batch of items.","p":"Give Jarvis a list of things and he processes them all one after another. Perfect for repetitive tasks like converting 20 files, updating 50 records, or sending multiple emails.","tg":["batch","bulk","list"],"cmd":"/batch","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-079","y":"shortcut","g":"Keyboard Shortcuts","n":"/insights","d":"Generate personal usage report card.","p":"Shows you a personalized report of how you've been using Claude Code over the last 30 days \u2014 your good habits, bad habits, and tips for improvement. Like a performance review for your AI workflow.","tg":["insights","analytics","habits"],"cmd":"/insights","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-080","y":"shortcut","g":"Keyboard Shortcuts","n":"/powerup","d":"Interactive tutorials for Claude Code features.","p":"Launches guided lessons that teach you Claude Code features step by step. There are 10 tutorials covering basics, modes, tools, skills, and agents. Great for learning new tricks.","tg":["tutorial","learning","onboarding"],"cmd":"/powerup","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-081","y":"shortcut","g":"Keyboard Shortcuts","n":"! <cmd>","d":"Run a shell command directly from Claude Code.","p":"Type an exclamation mark followed by any terminal command to run it immediately. Like typing 'ls' or 'npm start' without leaving the conversation. Quick and handy for one-off commands.","tg":["shell","command","quick"],"cmd":"! <command>","ico":"\u2328","bg":"#f3f4f6","fg":"#374151"},{"id":"x-082","y":"video","g":"Video Libraries","n":"MoviePy 2.1","d":"Python library for video editing and compositing.","p":"This lets Jarvis edit videos with code \u2014 trim clips, add text overlays, merge videos together, add transitions. Think of it as a programmable video editor. Great for automating repetitive video tasks.","tg":["python","video","editing","compositing"],"cmd":"pip install moviepy","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-083","y":"video","g":"Video Libraries","n":"ffmpeg-python 0.2","d":"Pythonic wrapper for FFmpeg commands.","p":"This makes FFmpeg's powerful video tools easier to use from Python code. Instead of memorizing complex command-line flags, Jarvis writes clean Python code that does the same thing.","tg":["python","ffmpeg","wrapper"],"cmd":"pip install ffmpeg-python","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-084","y":"video","g":"Video Libraries","n":"PyAV 14.0","d":"Direct access to FFmpeg's internals from Python.","p":"This gives the fastest possible video processing by talking directly to FFmpeg's engine. When MoviePy is too slow for a big job, PyAV handles it at full speed. For heavy-duty video work.","tg":["python","ffmpeg","performance"],"cmd":"pip install av","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-085","y":"video","g":"Video Libraries","n":"MovieLite 0.2","d":"Lightweight video editing for simple tasks.","p":"A simpler, lighter version of MoviePy for when you just need to do basic things like trim a clip or join two videos. Installs faster and uses less memory. Good enough for most simple jobs.","tg":["python","video","lightweight"],"cmd":"pip install movielite","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-086","y":"video","g":"Video Libraries","n":"movis 0.7","d":"Motion graphics and video composition library.","p":"This creates fancy animated graphics \u2014 text that flies in, shapes that move, layers that blend together. Perfect for making professional-looking title cards, lower thirds, and animated overlays.","tg":["python","motion-graphics","animation"],"cmd":"pip install movis","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-087","y":"video","g":"Video Libraries","n":"imageio 2.36","d":"Read and write images and video frames.","p":"This reads and writes individual frames from videos and handles all image formats. It's the bridge between 'video as a file' and 'video as a collection of pictures.' Used under the hood by other tools.","tg":["python","images","frames"],"cmd":"pip install imageio","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-088","y":"video","g":"Video Libraries","n":"FFmpeg 6.0 NVENC+CUDA","d":"GPU-accelerated video encoding and decoding.","p":"This uses your graphics card (GPU) to process video way faster than the CPU alone. A video that takes 10 minutes to process on CPU might take 1 minute with GPU acceleration. Requires an NVIDIA graphics card.","tg":["ffmpeg","gpu","cuda","nvidia"],"cmd":"ffmpeg -hwaccel cuda","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-089","y":"video","g":"Video Libraries","n":"OpenCV 4.10","d":"Computer vision and image processing library.","p":"This lets Jarvis 'see' and understand images and video \u2014 detect faces, track objects, read text from photos, measure distances. It's the eyes of the AI toolkit.","tg":["python","vision","detection","opencv"],"cmd":"pip install opencv-python","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-090","y":"video","g":"Video Libraries","n":"PySceneDetect 0.6","d":"Automatically detects scene changes in videos.","p":"This watches a video and figures out where one scene ends and the next begins. Perfect for automatically splitting a long video into clips, or finding all the different shots in a property tour.","tg":["python","scenes","detection"],"cmd":"pip install scenedetect","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-091","y":"video","g":"Video Libraries","n":"VidGear 0.3","d":"High-performance video capture and streaming.","p":"This captures video from cameras, streams, or files with maximum speed and stability. Use it when you need to process live video feeds or handle very large video files without crashing.","tg":["python","streaming","capture"],"cmd":"pip install vidgear","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-092","y":"video","g":"Video Libraries","n":"auto-editor 29.3","d":"Automatically removes silence from videos.","p":"This watches your video, finds all the quiet/boring parts where nothing is happening, and cuts them out automatically. Turn a 30-minute raw video into a tight 15-minute final cut with zero manual editing.","tg":["python","auto-edit","silence"],"cmd":"pip install auto-editor","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-093","y":"video","g":"Video Libraries","n":"decord 0.6","d":"Ultra-fast video frame loading for AI pipelines.","p":"This loads video frames into memory faster than any other tool. When an AI model needs to analyze thousands of video frames, decord feeds them in at maximum speed. Built for machine learning workflows.","tg":["python","frames","ml","fast"],"cmd":"pip install decord","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-094","y":"video","g":"Video Libraries","n":"rembg 2.0 (GPU)","d":"Removes backgrounds from images and video using AI.","p":"This magically erases the background from photos or video frames, leaving just the person or object. Like a green screen but without the green screen. Uses AI to figure out what's foreground vs background.","tg":["python","background","removal","ai"],"cmd":"pip install rembg[gpu]","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-095","y":"video","g":"Video Libraries","n":"pydub 0.25","d":"Simple audio manipulation in Python.","p":"This edits audio files \u2014 trim, merge, adjust volume, convert formats, add effects. Like a mini audio editor for when you need to process music, voiceovers, or podcast clips automatically.","tg":["python","audio","editing"],"cmd":"pip install pydub","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-096","y":"video","g":"Video Libraries","n":"librosa 0.11","d":"Audio analysis and feature extraction.","p":"This analyzes audio to understand its properties \u2014 tempo, pitch, loudness, beat patterns. Use it to find the perfect moment to cut a video on beat, or analyze voice recordings for quality.","tg":["python","audio","analysis"],"cmd":"pip install librosa","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-097","y":"video","g":"Video Libraries","n":"faster-whisper 1.2","d":"Fast speech-to-text transcription.","p":"This listens to audio or video and writes down everything that's said as text. It's fast, accurate, and works in many languages. Use it to create subtitles, transcripts, or searchable text from recordings.","tg":["python","transcription","speech","whisper"],"cmd":"pip install faster-whisper","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-098","y":"video","g":"Video Libraries","n":"pysubs2 1.8","d":"Read, write, and edit subtitle files.","p":"This handles subtitle files \u2014 create them, edit timing, change text, convert between formats (SRT, ASS, VTT). When faster-whisper creates the transcript, pysubs2 turns it into properly formatted subtitles.","tg":["python","subtitles","srt","formatting"],"cmd":"pip install pysubs2","ico":"\ud83d\udcf9","bg":"#fffbeb","fg":"#92400e"},{"id":"x-099","y":"api","g":"Connected APIs","n":"Anthropic (Claude)","d":"Claude AI models for reasoning, coding, and writing.","p":"This is Jarvis's main brain \u2014 the Claude AI that does all the thinking, writing, and coding. Every conversation you have goes through this API. It's the foundation everything else is built on.","tg":["ai","llm","claude","anthropic"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-100","y":"api","g":"Connected APIs","n":"OpenAI (Codex/GPT)","d":"OpenAI models for cross-model review and backup.","p":"This connects to OpenAI's AI models as a second opinion. When Jarvis reviews his own code, this lets a different AI double-check it, catching things Jarvis might miss. Also serves as a backup when Claude is busy.","tg":["ai","openai","gpt","codex"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-101","y":"api","g":"Connected APIs","n":"Google (Multiple)","d":"Google Cloud services including Gemini AI and Maps.","p":"This connects to Google's services \u2014 their Gemini AI for a third AI perspective, Google Maps for location data, and other Google Cloud tools. Multiple Google services bundled under one key.","tg":["google","gemini","maps","cloud"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-102","y":"api","g":"Connected APIs","n":"Mapbox","d":"Custom interactive maps and geocoding.","p":"This creates beautiful custom maps with pins, routes, and data overlays. Used for the RCSD WAN map and property location maps. Think Google Maps but fully customizable and brandable.","tg":["maps","geocoding","visualization"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-103","y":"api","g":"Connected APIs","n":"HeyGen","d":"AI avatar video generation.","p":"This creates videos with AI-generated people who talk and move realistically. You type a script and pick an avatar, and it produces a video of a virtual person delivering your message. Used for video outreach.","tg":["video","avatar","ai","outreach"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-104","y":"api","g":"Connected APIs","n":"Firecrawl","d":"Intelligent web scraping and data extraction.","p":"This reads websites and pulls out the useful information \u2014 text, prices, contact info, whatever you need. It understands page structure so it grabs the right data, not just raw HTML code.","tg":["scraping","web","data","extraction"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-105","y":"api","g":"Connected APIs","n":"Exa","d":"AI-powered web search with semantic understanding.","p":"This searches the internet but understands what you mean, not just the words you type. Ask 'companies that sell internet to schools in Texas' and it finds exactly that, even if no page uses those exact words.","tg":["search","semantic","web","ai"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-106","y":"api","g":"Connected APIs","n":"Pinecone","d":"Vector database for semantic search.","p":"This stores information in a way that lets Jarvis find related things by meaning, not just by keywords. It powers the 'smart search' over your Obsidian notes and project files.","tg":["vector","database","search","rag"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-107","y":"api","g":"Connected APIs","n":"Supabase","d":"Database, auth, and storage backend.","p":"This is the database that stores all your project data \u2014 contacts, email logs, campaign results, avatar info. It's like a smart spreadsheet in the cloud that Jarvis can read and write to instantly.","tg":["database","backend","storage","auth"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-108","y":"api","g":"Connected APIs","n":"SimplyRETS","d":"Real estate MLS data and property listings.","p":"This pulls real estate listing data \u2014 prices, photos, descriptions, property details \u2014 directly from the MLS. Used for Michelle's real estate listings and property marketing materials.","tg":["real-estate","mls","listings","property"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-109","y":"api","g":"Connected APIs","n":"Vapi","d":"Voice AI for phone calls and IVR.","p":"This makes and receives phone calls using an AI voice. It can answer the phone, have a conversation, take messages, and route calls. Like a virtual receptionist that never sleeps.","tg":["voice","phone","calls","ai"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-110","y":"api","g":"Connected APIs","n":"LiveKit","d":"Real-time voice and video communication.","p":"This handles live audio and video streams \u2014 voice calls, video conferences, real-time communication. It's the engine behind TAG's voice AI features and live agent interactions.","tg":["voice","video","realtime","streaming"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-111","y":"api","g":"Connected APIs","n":"AireSpring","d":"Telecom quoting and service availability.","p":"This checks if AireSpring's internet and phone services are available at a specific address and gets pricing quotes. Essential for the E-Rate proposal pipeline when building quotes for schools.","tg":["telecom","quoting","erate","availability"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-112","y":"api","g":"Connected APIs","n":"Apollo","d":"Contact enrichment and prospecting data.","p":"This finds detailed information about people and companies \u2014 emails, phone numbers, job titles, company size. Used to enrich the contact database and find decision-makers at target companies.","tg":["contacts","enrichment","prospecting"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-113","y":"api","g":"Connected APIs","n":"Microsoft Graph","d":"Outlook, Teams, OneDrive, and Office 365.","p":"This connects to your Microsoft account \u2014 send emails through Outlook, access OneDrive files, manage Teams. It's how Jarvis sends emails and accesses Microsoft services on your behalf.","tg":["microsoft","outlook","email","office"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-114","y":"api","g":"Connected APIs","n":"Salesforce","d":"CRM data and email-to-case logging.","p":"This connects to your Salesforce CRM to log activities, update contacts, and track deals. Every outbound email gets BCC'd to Salesforce automatically so nothing falls through the cracks.","tg":["crm","salesforce","logging","deals"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-115","y":"api","g":"Connected APIs","n":"Cloudflare","d":"DNS, tunnels, and edge networking.","p":"This manages your domain names and creates secure tunnels that let outside users access services running on your computer. Powers the home automation system's remote access.","tg":["dns","tunnels","networking","security"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-116","y":"api","g":"Connected APIs","n":"Vivint","d":"Smart home control and camera access.","p":"This controls your Vivint smart home system \u2014 cameras, door locks, sensors, alarm. Jarvis can check camera feeds, lock/unlock doors, and monitor home security all from the terminal.","tg":["smart-home","cameras","security","iot"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-117","y":"api","g":"Connected APIs","n":"GitHub","d":"Source code hosting and collaboration.","p":"This manages all your code repositories on GitHub \u2014 push changes, create pull requests, review code, manage issues. It's where all your project code lives and how teams collaborate on code.","tg":["git","code","repos","collaboration"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-118","y":"api","g":"Connected APIs","n":"Vercel","d":"Website deployment and hosting.","p":"This deploys your websites to the internet with one command. Push code and it automatically builds, tests, and publishes your site. The TAG AI website at ubntag.com runs on Vercel.","tg":["deploy","hosting","website","cdn"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-119","y":"api","g":"Connected APIs","n":"Context7","d":"Up-to-date documentation for any library.","p":"This pulls the latest documentation for any software library or framework. When Jarvis needs to know how a tool works, Context7 gives him the most current docs instead of relying on training data that might be outdated.","tg":["docs","documentation","libraries","context"],"cmd":"","ico":"\ud83d\udd11","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"x-120","y":"technique","g":"Advanced Techniques","n":"Ultraplan","d":"Cloud-powered multi-agent planning in Anthropic's cloud.","p":"Instead of Jarvis planning alone, this sends the task to four AI agents in the cloud who plan together in parallel. Three explore different approaches, one critiques them, and you get a polished plan delivered to a web page for review.","tg":["ultraplan","cloud","parallel","planning"],"cmd":"/ultraplan","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-121","y":"technique","g":"Advanced Techniques","n":"Auto-Research","d":"Self-improving optimization loops that run autonomously.","p":"Set up an experiment that runs itself 24/7. For example: test different email subject lines, measure which gets more replies, keep the winner, try a new challenger. It learns and improves automatically without you watching.","tg":["auto-research","karpathy","optimization","autonomous"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-122","y":"technique","g":"Advanced Techniques","n":"Multi-Agent Consensus","d":"Spawn multiple agents with different personalities to brainstorm.","p":"Create 5-10 AI agents that each think differently \u2014 one is conservative, one is adventurous, one is contrarian. They all tackle the same problem and a synthesizer picks the best ideas. Like brainstorming with a diverse team.","tg":["multi-agent","consensus","brainstorming","diversity"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-123","y":"technique","g":"Advanced Techniques","n":"Context Fork","d":"Run a skill in its own isolated context window.","p":"When a task needs lots of files and instructions, running it in the main conversation would clutter everything up. Context fork runs it in a separate space and only sends back the final result, keeping your main conversation clean.","tg":["context","fork","isolation","skills"],"cmd":"context: fork (in skill YAML)","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-124","y":"technique","g":"Advanced Techniques","n":"Background Sub-Agents","d":"Long-running tasks that work while you keep chatting.","p":"Start a big task (like a 20-minute code review) and let it run in the background while you continue working on other things. You'll get notified when it's done. Like putting a load of laundry in while you cook dinner.","tg":["background","async","parallel","long-running"],"cmd":"background: true (in agent config)","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-125","y":"technique","g":"Advanced Techniques","n":"Codex Adversarial Review","d":"Use OpenAI's Codex to audit code that Claude wrote.","p":"Have a different AI company's model review Jarvis's code specifically looking for problems. It checks 7 attack surfaces including security holes, race conditions, and data loss risks. Two different AI brains catch more bugs than one.","tg":["codex","adversarial","security","review"],"cmd":"codex:adversarial-review","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-126","y":"technique","g":"Advanced Techniques","n":"Claude.md 4 Purposes","d":"Four distinct uses for your Claude.md configuration file.","p":"Your Claude.md file serves four jobs: (1) a compressed map of your codebase, (2) your personal preferences and coding style, (3) telling Jarvis what he CAN do (he often underestimates himself), (4) a log of what worked and what didn't so he doesn't repeat mistakes.","tg":["claude-md","configuration","knowledge","optimization"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-127","y":"technique","g":"Advanced Techniques","n":"Skill Workshop","d":"Create, test, and A/B compare custom skills.","p":"Build your own reusable skill files that teach Jarvis new abilities. The workshop includes A/B testing to prove your skill actually improves results compared to the base model. If it doesn't help, you'll know.","tg":["skills","creation","testing","improvement"],"cmd":"/skill creator","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-128","y":"technique","g":"Advanced Techniques","n":"Browser Automation Spectrum","d":"Four levels of browser control from simple to undetectable.","p":"Four ways to control a browser, from cheapest to most powerful: (1) HTTP requests (fast but fragile), (2) Chrome DevTools (good middle ground), (3) Browser Use (undetectable, beats anti-bot systems), (4) Computer Use (controls actual mouse, works on anything). Start simple, escalate only when needed.","tg":["browser","automation","scraping","anti-detection"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-129","y":"technique","g":"Advanced Techniques","n":"Karpathy Knowledge Architecture","d":"Organize knowledge like a compiler: raw, compiled, indexed.","p":"Organize your notes in three layers: raw materials (articles, transcripts), compiled wiki (structured knowledge with links), and an index file that tells Jarvis where everything is. The index is the most important file \u2014 it's Jarvis's table of contents for your entire knowledge base.","tg":["knowledge","karpathy","wiki","index","obsidian"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-130","y":"technique","g":"Advanced Techniques","n":"Context Rot","d":"Performance degrades as conversation gets longer.","p":"As a conversation fills up with messages, Jarvis's accuracy drops from 92% to 78%. The first 200K tokens are the 'gold zone.' After that, quality starts declining. Solution: clear the conversation and start fresh rather than pushing through a stale, overstuffed context.","tg":["context","performance","degradation","tokens"],"cmd":"/clear","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-131","y":"technique","g":"Advanced Techniques","n":"Agent Teams vs Sub-Agents","d":"Teams communicate with each other; sub-agents don't.","p":"Sub-agents are workers who go off alone and come back with results. Agent teams are workers who can talk to each other during the task \u2014 the writer can ask the researcher for more data, and the reviewer can send the writer back to fix things. Teams produce better results but cost more.","tg":["teams","sub-agents","communication","coordination"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-132","y":"technique","g":"Advanced Techniques","n":"A/B Testing for Skills","d":"Prove that a skill improves output vs base model.","p":"Before trusting a custom skill, test it: run the same task with and without the skill, compare results blindly. If the skill doesn't make the output better, delete it. Especially important when new AI models come out that might already know what your skill teaches.","tg":["ab-testing","skills","evaluation","comparison"],"cmd":"Skill Creator built-in","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-133","y":"technique","g":"Advanced Techniques","n":"/insights Performance Review","d":"Personalized report card of your Claude Code habits.","p":"This generates a web page showing your usage patterns over 30 days \u2014 what you do well, what you could improve, and specific tips based on YOUR actual behavior. Like getting a personalized coaching session from your tools.","tg":["insights","analytics","improvement","personal"],"cmd":"/insights","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-134","y":"technique","g":"Advanced Techniques","n":"Plugins (Coming)","d":"Active code extensions that go beyond passive skills.","p":"Skills are instructions (passive knowledge). Plugins are programs that actively run \u2014 they add new commands, hook into events, and talk to external services. A standardization effort is underway so one plugin works across Claude Code, Cursor, and Codex. Coming in 2026.","tg":["plugins","extensions","ecosystem","future"],"cmd":"","ico":"\ud83e\udde0","bg":"#eff6ff","fg":"#1e40af"},{"id":"x-135","y":"workflow","g":"Production Workflows","n":"Spectrum Campaign Flow","d":"End-to-end outreach: data pull, draft, approve, send, log.","p":"The full process for sending sales emails to Spectrum/Charter accounts: pull contact data from Supabase, draft emails using the v6 tone, show Gus for approval, send through Outlook, BCC Salesforce, and log results. 74 emails sent in one session using this flow.","tg":["spectrum","email","outreach","campaign"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-136","y":"workflow","g":"Production Workflows","n":"Michelle Listing Flow","d":"Full property marketing: photos, videos, social, print.","p":"The complete marketing pipeline for Michelle's real estate listings: process professional photos, create social media posts for Facebook/Instagram/Pinterest, generate video tours, design print materials, and post to 58 Facebook groups.","tg":["real-estate","marketing","listings","social"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-137","y":"workflow","g":"Production Workflows","n":"Knowledge Flywheel","d":"YouTube video to rules, skills, and knowledge base.","p":"Watch a YouTube video, extract the key lessons, turn them into Jarvis rules and skills, store in Supabase, sync to Obsidian. Every video makes Jarvis smarter permanently. 18 videos produced 420 entries, 73 rules, and 26 new skills.","tg":["knowledge","youtube","learning","automation"],"cmd":"/ingest-video","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-138","y":"workflow","g":"Production Workflows","n":"Morning Autopilot","d":"Automated morning routine: emails, calendar, priorities.","p":"Jarvis runs through your morning automatically: check email, review calendar, identify urgent items, prepare summaries, and present your day's priorities. Everything is ready by the time you sit down with coffee.","tg":["morning","routine","email","priorities"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-139","y":"workflow","g":"Production Workflows","n":"Code Quality Pipeline","d":"Lint, test, review, and audit before every deploy.","p":"Before any code goes live, it runs through automatic checks: linting catches style issues, tests verify functionality, Codex adversarial review finds security holes, and a final human review catches anything the machines missed.","tg":["quality","testing","review","deployment"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-140","y":"workflow","g":"Production Workflows","n":"Social Media Pipeline","d":"Create, schedule, and post content across platforms.","p":"One piece of content gets adapted for every platform: full post for Facebook, thread for Twitter, visual for Instagram, pin for Pinterest, story for Stories. Each version is optimized for that platform's format and audience.","tg":["social","content","multi-platform","scheduling"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-141","y":"workflow","g":"Production Workflows","n":"Auto-Subtitle Pipeline","d":"Transcribe, generate subtitles, burn into video.","p":"Three steps that happen automatically: faster-whisper transcribes the audio, pysubs2 formats it as subtitle files with correct timing, and FFmpeg burns the subtitles into the video. A 10-minute video gets professional subtitles in about 2 minutes.","tg":["subtitles","transcription","video","automation"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-142","y":"workflow","g":"Production Workflows","n":"AI Background Swap","d":"Remove and replace backgrounds in photos/video.","p":"Using rembg, the AI removes the original background from a photo or video, then composites the subject onto a new background. Perfect for creating polished marketing images without a photo studio.","tg":["background","removal","compositing","photos"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-143","y":"workflow","g":"Production Workflows","n":"Boris Daily Playbook","d":"Run 5-10 parallel Claude sessions, review and approve plans.","p":"Boris Cherny's workflow: open 5-10 Claude Code sessions in different tabs, give each one a task, let them all plan simultaneously, circle back to review plans, approve the good ones, and let them execute. 10-30 PRs shipped per day with zero hand-written code.","tg":["parallel","productivity","boris","workflow"],"cmd":"","ico":"\ud83d\udd04","bg":"#fffbeb","fg":"#92400e"},{"id":"x-144","y":"workflow","g":"Seven-Point Property Tour","n":"01 Opening Drone","d":"Aerial establishing shot of the property and neighborhood.","p":"The video starts with a drone flying over the neighborhood, showing the house from above. This gives viewers a sense of the location, surrounding area, and lot size before they even step inside. Sets the premium tone.","tg":["drone","aerial","opening","establishing"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-145","y":"workflow","g":"Seven-Point Property Tour","n":"02 Curb Appeal","d":"Front exterior, landscaping, driveway, and entrance.","p":"The camera comes down to street level and shows the front of the house \u2014 the lawn, landscaping, driveway, and front door. This is the buyer's first impression, like swiping right on a dating app. It needs to look inviting.","tg":["exterior","curb-appeal","entrance","landscaping"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-146","y":"workflow","g":"Seven-Point Property Tour","n":"03 Kitchen","d":"Kitchen layout, appliances, counters, and storage.","p":"The kitchen is where families spend most of their time, so it gets its own dedicated segment. Show the countertops, appliances, island, pantry, and natural light. This is usually the most important room for buyers.","tg":["kitchen","interior","appliances","counters"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-147","y":"workflow","g":"Seven-Point Property Tour","n":"04 Master Suite","d":"Master bedroom, bathroom, closet, and en-suite features.","p":"The master suite is the private retreat \u2014 show the bedroom size, closet space, bathroom features (double vanity, walk-in shower, tub), and any special touches. Buyers imagine themselves relaxing here.","tg":["master","bedroom","bathroom","closet"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-148","y":"workflow","g":"Seven-Point Property Tour","n":"05 Family Room","d":"Main living space, entertainment area, and flow.","p":"Show the main gathering space where the family hangs out \u2014 the living room or family room. Highlight the size, natural light, fireplace, built-ins, and how it connects to other rooms. Buyers need to picture their couch here.","tg":["family-room","living","entertainment","flow"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-149","y":"workflow","g":"Seven-Point Property Tour","n":"06 Outdoor","d":"Backyard, patio, pool, and outdoor living areas.","p":"Texas homes live and die by their outdoor space. Show the patio, covered porch, pool, lawn, fencing, and any outdoor kitchen or fire pit. In DFW, this is often the dealmaker or dealbreaker for buyers.","tg":["outdoor","backyard","pool","patio"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-150","y":"workflow","g":"Seven-Point Property Tour","n":"07 Closing Drone","d":"Final aerial shot with branding and call-to-action.","p":"The video ends with the drone pulling back up for a dramatic final shot of the property. Overlay the agent's branding, contact info, and a clear call to action. Leave the viewer with a 'wow' moment that makes them want to schedule a showing.","tg":["drone","closing","branding","cta"],"cmd":"","ico":"\ud83c\udfe0","bg":"#f3f4f6","fg":"#374151"},{"id":"x-151","y":"tool","g":"Memory System","n":"Auto-Memory (30+ files)","d":"Automatic memory files created from conversations.","p":"Every important thing Jarvis learns about you, your projects, and your preferences gets saved to a memory file automatically. There are over 30 of these files covering everything from email rules to API keys to project history. They persist across sessions.","tg":["memory","auto","persistent","files"],"cmd":"~/.claude/projects/*/memory/","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"x-152","y":"tool","g":"Memory System","n":"MEMORY.md Index","d":"Master index pointing to all memory files.","p":"This is the table of contents for Jarvis's entire memory system. It lists every memory file with a one-line description so Jarvis knows where to find information. When he starts a new session, this is the first thing he reads.","tg":["memory","index","navigation","master"],"cmd":"MEMORY.md","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"x-153","y":"tool","g":"Memory System","n":"Rules (73+ files)","d":"Behavioral rules loaded based on what you're working on.","p":"There are 73 rule files that tell Jarvis how to behave in specific situations. They load automatically based on what file or folder you're working in. For example, email rules only load when working on email code, not when building a website.","tg":["rules","behavior","context","path-specific"],"cmd":"~/.claude/rules/","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"x-154","y":"tool","g":"Memory System","n":"Session Hooks","d":"Automatic actions at session start and end.","p":"Every time Jarvis starts or finishes a session, automatic scripts run. At startup, they load context about current projects. At the end, they save a log of what happened. Like clocking in and out at work, but automatic.","tg":["hooks","session","automatic","logging"],"cmd":"erate-session-start.js","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"x-155","y":"tool","g":"Memory System","n":"Pinecone RAG","d":"Semantic search over your Obsidian vault.","p":"This lets Jarvis search your entire Obsidian knowledge vault by meaning, not just keywords. Ask 'what did we learn about email deliverability?' and it finds relevant notes even if they don't use those exact words. 221 vectors synced automatically.","tg":["pinecone","rag","semantic","search","obsidian"],"cmd":"npm run search -- \"query\"","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"x-156","y":"tool","g":"Memory System","n":"Obsidian Vault","d":"91+ structured notes synced with Pinecone.","p":"Your Obsidian vault is the human-readable knowledge base \u2014 91 notes organized with tags, links, and folders. It syncs to Pinecone for AI search and serves as the 'source of truth' for project knowledge. Both you and Jarvis can read and update it.","tg":["obsidian","vault","notes","knowledge"],"cmd":"","ico":"\ud83d\udcbe","bg":"#f3f4f6","fg":"#374151"},{"id":"v-001","y":"tool","g":"Voice AI & Telecom","n":"Twilio CLI","d":"Telephony CLI \u2014 SMS, voice calls, SIP trunking.","p":"Twilio CLI (v6.2.4) lets you manage phone numbers, send SMS, make voice calls, and configure SIP trunking from the terminal. Note: Telnyx is 2-7x cheaper \u2014 Twilio is the backup. API keys in Sticky Notes only. Python SDK v9.3.7 also installed.","tg":["twilio","sms","voice","telephony","cli","sip"],"cmd":"twilio","ico":"\u260e","bg":"#fef2f2","fg":"#991b1b","status":"installed"},{"id":"v-002","y":"tool","g":"Voice AI & Telecom","n":"Telnyx CLI","d":"Primary telephony \u2014 2-7x cheaper than Twilio.","p":"Telnyx CLI (v0.10.0, Go binary) manages phone numbers, SIP trunking, SMS, and voice. TAG primary telephony: SMS $0.004 (vs Twilio $0.0083), Voice $0.002/min (vs $0.014/min). Two API keys: TAG-Telnyx/.env + Sticky Notes. Python SDK v4.101.0.","tg":["telnyx","sms","voice","telephony","cli","sip","primary"],"cmd":"telnyx","ico":"\u260e","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"v-003","y":"tool","g":"Voice AI & Telecom","n":"RingCentral SDK","d":"UCaaS platform \u2014 calls, meetings, messaging.","p":"RingCentral Extensible SDK (@rc-ex/core v1.8.0 npm + Python SDK v0.9.2). Full UCaaS platform for voice calls, video meetings, team messaging. No standalone CLI \u2014 use via SDK or REST API. Gus has active account.","tg":["ringcentral","ucaas","voice","meetings","messaging","enterprise"],"cmd":"","ico":"R","bg":"#eff6ff","fg":"#1e40af","status":"live"},{"id":"v-004","y":"tool","g":"Voice AI & Telecom","n":"LiveKit CLI","d":"Real-time WebRTC voice/video \u2014 nearly free.","p":"LiveKit CLI (lk v2.13.2) + Python SDK v1.0.25 + 7 plugins (agents, deepgram, cartesia, anthropic, openai, silero, turn-detector). Powers real-time voice AI agents via WebRTC. API key + secret in ~/.env.","tg":["livekit","webrtc","voice","video","realtime","agents"],"cmd":"lk","ico":"L","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"v-005","y":"tool","g":"Voice AI & Telecom","n":"Deepgram SDK","d":"Speech-to-text \u2014 $200 free credit (~45K min).","p":"Deepgram Python SDK v6.1.1. STT: $0.0043/min batch, $0.0077/min streaming. $200 free credit. Two keys: Master .env + TAG-MCP-Orchestration. Also available as LiveKit plugin.","tg":["deepgram","stt","speech-to-text","transcription","voice"],"cmd":"","ico":"D","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"v-006","y":"tool","g":"Voice AI & Telecom","n":"VAPI Platform","d":"All-in-one voice AI \u2014 $0.30/min (STT+LLM+TTS).","p":"VAPI MCP Server (10 tools) + Python SDK v0.1.0. Bundles STT + LLM + TTS at $0.30-0.33/min. 10 MCP tools: create_assistant, create_call, list_assistants, list_calls, list_phone_numbers, etc.","tg":["vapi","voice-ai","phone","agents","stt","tts","all-in-one"],"cmd":"","ico":"V","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"v-007","y":"tool","g":"Voice AI & Telecom","n":"Cartesia TTS","d":"Text-to-speech engine \u2014 fast, low latency.","p":"Cartesia TTS API \u2014 fast, low-latency text-to-speech. API key LIVE in Master .env. Also available as LiveKit plugin. No CLI \u2014 API only.","tg":["cartesia","tts","text-to-speech","voice","synthesis"],"cmd":"","ico":"C","bg":"#ecfdf5","fg":"#166534","status":"live"},{"id":"v-008","y":"tool","g":"Voice AI & Telecom","n":"ElevenLabs","d":"Premium TTS voices \u2014 DEAD (keys revoked).","p":"Both API keys return 401 errors (revoked). Alternative: Cartesia TTS (active) or VAPI bundled TTS.","tg":["elevenlabs","tts","voices","dead"],"cmd":"","ico":"X","bg":"#fef2f2","fg":"#991b1b","status":"dead"},{"id":"v-009","y":"tool","g":"Voice AI & Telecom","n":"Nexmo / Vonage CLI","d":"SMS and voice API (legacy install).","p":"Nexmo CLI v0.3.17 (now Vonage). Installed via npm. SMS, voice calls, number management. Low priority \u2014 Telnyx is primary.","tg":["nexmo","vonage","sms","voice","legacy"],"cmd":"nexmo","ico":"N","bg":"#fffbeb","fg":"#92400e","status":"installed"},{"id":"v-010","y":"workflow","g":"Voice AI & Telecom","n":"Voice Agent Pipeline","d":"Call > Telnyx SIP > VAPI > Deepgram STT > Claude > Cartesia TTS > Caller.","p":"Complete voice AI flow: Inbound calls through Telnyx SIP, VAPI orchestrates, Deepgram STT, Claude reasoning, Cartesia TTS back to caller. Alt: LiveKit WebRTC for browser. Cost: ~$0.30/min via VAPI.","tg":["pipeline","voice-agent","architecture","flow","sip"],"cmd":"","ico":"P","bg":"#fffbeb","fg":"#92400e"},{"id":"v-011","y":"workflow","g":"Voice AI & Telecom","n":"Telecom Cost Matrix","d":"Telnyx vs Twilio vs VAPI pricing.","p":"SMS: Telnyx $0.004 vs Twilio $0.0083 (2x). Voice: Telnyx $0.002/min vs Twilio $0.014 (7x). STT: Deepgram $0.0043/min. All-in: VAPI $0.30-0.33/min. WebRTC: LiveKit nearly free.","tg":["pricing","comparison","cost","optimization"],"cmd":"","ico":"$","bg":"#fffbeb","fg":"#92400e"},{"id":"s-077","y":"skill","g":"Sales & Demos","n":"/client-demo","d":"Build and deploy a branded demo site for a sales prospect in under 15 minutes.","p":"This builds a live demo website for a potential client using their brand colors and services. You give it a URL, and Claude scrapes their brand, builds a landing page with shadcn components, takes a screenshot for you to review, and deploys it to Vercel. Perfect for closing a prospect on a live call - show them a real website with THEIR brand in 15 minutes.","tg":["demo","sales","website","prospect","vercel"],"cmd":"/client-demo https://example.com","ico":"\ud83c\udfaf","bg":"#fef3c7","fg":"#92400e"},{"id":"s-078","y":"skill","g":"Frontend Design","n":"remotion-best-practices","d":"Official Remotion skills for building video content programmatically.","p":"This teaches Claude how to use Remotion properly for creating videos with code. Useful for Michelle's listing video assets and any programmatic video generation. Installed today via skills.sh.","tg":["remotion","video","rendering","react"],"cmd":"Auto-triggers when you mention Remotion","ico":"\ud83c\udfac","bg":"#e0e7ff","fg":"#3730a3"},{"id":"s-079","y":"skill","g":"Frontend Design","n":"shadcn","d":"Official shadcn/ui component library skill for polished React UIs.","p":"This teaches Claude how to use shadcn/ui components properly. shadcn is the popular library of pre-built, beautiful React components. When Claude builds a website with this skill installed, everything looks professional instead of generic AI slop.","tg":["shadcn","ui","components","react","design"],"cmd":"Auto-triggers when building UIs","ico":"\ud83c\udfa8","bg":"#dcfce7","fg":"#166534"},{"id":"x-157","y":"feature","g":"Agent Teams","n":"TeamCreate","d":"Create a coordinated team of agents that communicate with each other.","p":"This lets Claude spawn a team of multiple AI agents that talk to each other and work together. Unlike regular subagents, team members can discuss and coordinate. Example: researcher scrapes a site, designer builds a page, reviewer critiques it - all in parallel, talking to each other. Requires tmux for visualization.","tg":["team","agents","parallel","tmux"],"cmd":"create an agent team to [task]","ico":"\ud83d\udc65","bg":"#f5f3ff","fg":"#6d28d9"},{"id":"x-158","y":"feature","g":"Agent Teams","n":"SendMessage","d":"Send messages between teammates in an agent team.","p":"How agents in a team talk to each other. The team lead assigns tasks, teammates report back. Only works inside an active agent team.","tg":["team","message","coordination"],"cmd":"Used internally by agent teams","ico":"\ud83d\udce8","bg":"#f5f3ff","fg":"#6d28d9"},{"id":"x-159","y":"feature","g":"Agent Teams","n":"TeamDelete","d":"Shut down an agent team and clean up resources when work is done.","p":"Cleans up a team after everyone's done. Removes team files, stops all agents. Use when a project is complete to free up resources.","tg":["team","cleanup"],"cmd":"Used when team work completes","ico":"\ud83d\uddd1","bg":"#f5f3ff","fg":"#6d28d9"},{"id":"x-160","y":"technique","g":"Claude Code Techniques","n":"Skill Chaining","d":"Chain multiple skills together via context: fork in an orchestrator skill.","p":"Powerful pattern: one skill calls other skills in sequence. Add 'context: fork' to a skill's frontmatter and it runs in its own context window. Each step writes a file the next step reads. Builds complex workflows from simple building blocks.","tg":["skills","chaining","orchestrator","pipeline"],"cmd":"Add context: fork to SKILL.md","ico":"\ud83d\udd17","bg":"#dbeafe","fg":"#1e40af"},{"id":"x-161","y":"technique","g":"Claude Code Techniques","n":"Advisor Tool","d":"Pair cheap executor model with Opus advisor for cost-optimized agents.","p":"Anthropic's new pattern: Sonnet or Haiku does the work but calls Opus for strategic guidance when needed. Opus-level intelligence at Haiku prices. Perfect for agent pipelines. Beta header: advisor-tool-2026-03-01.","tg":["advisor","opus","cost-optimization","messages-api"],"cmd":"Add advisor_20260301 tool to API","ico":"\ud83e\udde0","bg":"#dbeafe","fg":"#1e40af"},{"id":"x-162","y":"shortcut","g":"Claude Code Techniques","n":"/model opus plan","d":"Opus in plan mode, Sonnet for execution - saves session quota.","p":"Claude Code version of the advisor pattern. Opus plans the work (smart), Sonnet executes it (fast and cheap). Automatically switches based on plan mode. Saves session quota so you work longer before hitting limits.","tg":["model","opus","sonnet","plan-mode","efficiency"],"cmd":"/model opus plan","ico":"\u26a1","bg":"#f5f3ff","fg":"#6d28d9"},{"id":"x-163","y":"technique","g":"Subagents","n":"Subagent Persistent Memory","d":"Give subagents memory that survives across conversations.","p":"Add 'memory: user' (or project/local) to a subagent's frontmatter and it gets a directory to save learnings. Every time you use the agent it gets smarter because it remembers what worked before.","tg":["subagent","memory","persistent","learning"],"cmd":"Add memory: user to frontmatter","ico":"\ud83d\udcad","bg":"#ccfbf1","fg":"#115e59"},{"id":"x-164","y":"technique","g":"Subagents","n":"Subagent Worktree Isolation","d":"Run subagents in isolated git worktrees to protect your main repo.","p":"Add 'isolation: worktree' to a subagent's frontmatter and it works in a disposable copy of your repo. If the agent makes mistakes, nothing touches your real code. Auto-cleaned when done.","tg":["subagent","worktree","isolation","safety","git"],"cmd":"Add isolation: worktree","ico":"\ud83c\udf33","bg":"#ccfbf1","fg":"#115e59"}];

const badgeMap={skill:'b-skill',mcp:'b-mcp',api:'b-api',agent:'b-agent',feature:'b-feature',shortcut:'b-shortcut',video:'b-video',technique:'b-technique',workflow:'b-workflow',tool:'b-tool'};
const typeLabel={skill:'Skill',mcp:'MCP',api:'API',agent:'Agent',feature:'Feature',shortcut:'Shortcut',video:'Video Lib',technique:'Technique',workflow:'Workflow',tool:'Tool'};
const navItems=[
{id:'*',label:'Everything',ico:'\u{1F4CA}'},
{id:'skill',label:'Skills',ico:'\u{1F3AF}'},
{id:'mcp',label:'MCP Tools',ico:'\u{1F310}'},
{id:'api',label:'APIs',ico:'\u{1F511}'},
{id:'agent',label:'Sub-Agents',ico:'\u{1F916}'},
{id:'tool',label:'Tools',ico:'\u{1F527}'},
{id:'workflow',label:'Workflows',ico:'\u{1F504}'},
{id:'video',label:'Video Libs',ico:'\u{1F3AC}'},
{id:'technique',label:'Techniques',ico:'\u{1F4A1}'},
{id:'shortcut',label:'Shortcuts',ico:'\u{2328}'},
{id:'feature',label:'Features',ico:'\u{2699}'}
];

// ---- APP STATE ----
let filterType = '*';
let filterGroup = null;
let searchTerm = '';

// ---- GROUP ORDER ----
const groupOrder = [
  'GSD Project Management','GSD DevOps','GSD Workspaces',
  'Built-in Tools','Power Features','Advanced Techniques','Keyboard Shortcuts','CLI Tools',
  'Marketing & Outreach','Salesforce','Design & Frontend','Document Generation',
  'Testing & Quality','Research & Knowledge',
  'Video & Media','Video Libraries','Video & Media \u2014 Knowledge Base','Seven-Point Property Tour','Production Workflows',
  'Workflow & Meta','Infrastructure & Ops','Sub-Agent Types','Codex',
  'MCP: Gmail','MCP: Figma','MCP: Playwright','MCP: Apollo','MCP: HeyGen',
  'MCP: Mapbox','MCP: Tavily','MCP: Canva','MCP: NotebookLM','MCP: Vapi',
  'MCP: n8n','MCP: Exa','MCP: Firecrawl','MCP: Google Calendar','MCP: Outreach',
  'Connected APIs','Memory System','Voice AI & Telecom'
];

// ---- SIDEBAR ----
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const defaultNav = [
    {id:'*',label:'Everything',ico:'\uD83D\uDCCA'},
    {id:'skill',label:'Skills',ico:'\uD83C\uDFAF'},
    {id:'mcp',label:'MCP Tools',ico:'\uD83C\uDF10'},
    {id:'api',label:'APIs',ico:'\uD83D\uDD11'},
    {id:'agent',label:'Sub-Agents',ico:'\uD83E\uDD16'},
    {id:'tool',label:'Tools',ico:'\uD83D\uDD27'},
    {id:'feature',label:'Features',ico:'\u26A1'},
    {id:'shortcut',label:'Shortcuts',ico:'\u2328\uFE0F'},
    {id:'video',label:'Video Libs',ico:'\uD83C\uDFAC'},
    {id:'technique',label:'Techniques',ico:'\uD83E\uDDE0'},
    {id:'workflow',label:'Workflows',ico:'\uD83D\uDD04'}
  ];
  const allNav = typeof navItems !== 'undefined' ? navItems : defaultNav;

  let html = '<div class="nav-section">Filter by Type</div>';
  allNav.forEach(function(item) {
    const count = item.id === '*' ? C.length : C.filter(function(c){return c.y===item.id}).length;
    if (count === 0 && item.id !== '*') return;
    const active = (filterType === item.id && !filterGroup) ? ' active' : '';
    html += '<button class="nav-btn' + active + '" onclick="setTypeFilter(\'' + item.id + '\')">' +
      '<span class="ico">' + item.ico + '</span><span class="label">' + item.label + '</span>' +
      '<span class="count">' + count + '</span></button>';
  });

  html += '<div class="nav-section" style="margin-top:16px">Browse by Group</div>';
  const usedGroups = [];
  C.forEach(function(c) { if (usedGroups.indexOf(c.g) === -1) usedGroups.push(c.g); });
  const sorted = groupOrder.filter(function(g){return usedGroups.indexOf(g) !== -1});
  usedGroups.forEach(function(g){ if(sorted.indexOf(g)===-1) sorted.push(g); });

  sorted.forEach(function(g) {
    const count = C.filter(function(c){return c.g===g}).length;
    const ico = g.indexOf('MCP:')===0 ? '\uD83D\uDD0C' : g.indexOf('GSD')===0 ? '\uD83D\uDCCB' : g==='Connected APIs' ? '\uD83D\uDD11' : g==='Memory System' ? '\uD83E\uDDE0' : g==='Voice AI & Telecom' ? '\uD83D\uDCDE' : g==='Salesforce' ? '\u2601\uFE0F' : g==='Video & Media' || g==='Video Libraries' ? '\uD83C\uDFAC' : g==='Keyboard Shortcuts' ? '\u2328\uFE0F' : g==='Sub-Agent Types' ? '\uD83E\uDD16' : '\uD83D\uDCC1';
    const active = filterGroup === g ? ' active' : '';
    const safeG = g.replace(/'/g, "\\'");
    html += '<button class="nav-btn' + active + '" onclick="setGroupFilter(\'' + safeG + '\')">' +
      '<span class="ico">' + ico + '</span><span class="label">' + g + '</span>' +
      '<span class="count">' + count + '</span></button>';
  });
  nav.innerHTML = html;
}

// ---- FILTERS ----
function setTypeFilter(type) {
  filterType = type;
  filterGroup = null;
  render();
  buildSidebar();
}
function setGroupFilter(group) {
  filterGroup = filterGroup === group ? null : group;
  filterType = '*';
  render();
  buildSidebar();
  // Scroll main to top
  document.getElementById('mainContent').scrollTop = 0;
}

// ---- RENDER ----
function render() {
  const main = document.getElementById('mainContent');
  searchTerm = document.getElementById('searchInput').value;
  const q = searchTerm.toLowerCase().trim();

  let items = C;
  if (filterType !== '*' && !filterGroup) items = items.filter(function(c){return c.y===filterType});
  if (filterGroup) items = items.filter(function(c){return c.g===filterGroup});
  if (q) {
    items = items.filter(function(c) {
      const hay = (c.n + ' ' + c.d + ' ' + (c.p||'') + ' ' + (c.tg||[]).join(' ') + ' ' + c.g).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
  }

  document.getElementById('showCount').textContent = items.length;

  if (items.length === 0) {
    main.innerHTML = '<div class="no-results"><div class="big-ico">\uD83D\uDD0D</div><h3>No results found</h3><p>Try a different search or filter</p></div>';
    document.getElementById('groupCount').textContent = '0';
    return;
  }

  var grouped = {};
  items.forEach(function(c) {
    if (!grouped[c.g]) grouped[c.g] = [];
    grouped[c.g].push(c);
  });

  var groupKeys = groupOrder.filter(function(g){return !!grouped[g]});
  Object.keys(grouped).forEach(function(g){if(groupKeys.indexOf(g)===-1) groupKeys.push(g)});
  document.getElementById('groupCount').textContent = groupKeys.length;

  var html = '';
  groupKeys.forEach(function(g) {
    var arr = grouped[g];
    html += '<div class="group-title" id="grp-' + g.replace(/[^a-zA-Z0-9]/g,'_') + '">' + escHtml(g) + ' <span class="g-count">' + arr.length + '</span></div>';
    html += '<div class="grid">';
    arr.forEach(function(c) {
      var badge = badgeMap[c.y] || 'b-tool';
      var label = typeLabel[c.y] || c.y;
      var statusHtml = c.status ? '<div class="status-dot ' + c.status + '" title="' + c.status + '"></div>' : '';
      html += '<div class="card" onclick="openModal(\'' + c.id + '\')">' +
        statusHtml +
        '<div class="card-top">' +
          '<div class="card-ico" style="background:' + (c.bg||'#f1f5f9') + ';color:' + (c.fg||'#475569') + '">' + (c.ico||'\uD83D\uDCE6') + '</div>' +
          '<div class="card-info"><div class="card-name">' + escHtml(c.n) + '</div><div class="card-desc">' + escHtml(c.d) + '</div></div>' +
        '</div>' +
        '<div class="card-bottom"><span class="badge ' + badge + '">' + label + '</span>' +
        (c.tg||[]).slice(0,3).map(function(t){return '<span class="tag">' + escHtml(t) + '</span>'}).join('') +
        '</div></div>';
    });
    html += '</div>';
  });
  main.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- MODAL ----
function openModal(id) {
  var c = C.find(function(x){return x.id===id});
  if (!c) return;
  var badge = badgeMap[c.y] || 'b-tool';
  var label = typeLabel[c.y] || c.y;
  var overlay = document.getElementById('modalOverlay');
  var modal = document.getElementById('modalContent');

  var html = '<button class="modal-close" onclick="closeModal()">&times;</button>';
  html += '<h2>' + (c.ico||'') + ' ' + escHtml(c.n) + '</h2>';
  html += '<div class="detail-meta"><span class="badge ' + badge + '">' + label + '</span>';
  if (c.status) {
    var sBadge = c.status==='live' ? 'b-skill' : c.status==='installed' ? 'b-api' : 'b-mcp';
    html += '<span class="badge ' + sBadge + '">' + c.status + '</span>';
  }
  html += '<span class="tag">' + escHtml(c.g) + '</span></div>';
  html += '<div class="detail-desc">' + escHtml(c.d) + '</div>';
  if (c.p) html += '<div class="detail-plain">' + escHtml(c.p) + '</div>';
  if (c.tg && c.tg.length) html += '<div class="detail-meta">' + c.tg.map(function(t){return '<span class="tag">' + escHtml(t) + '</span>'}).join('') + '</div>';
  if (c.cmd) html += '<div class="detail-cmd" onclick="copyCmd(this)" title="Click to copy">' + escHtml(c.cmd) + '</div>';

  modal.innerHTML = html;
  overlay.classList.add('show');
}

function closeModal(e) {
  document.getElementById('modalOverlay').classList.remove('show');
}

function copyCmd(el) {
  var text = el.textContent.replace(' (click to copy)','').trim();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    el.style.background = '#166534';
    setTimeout(function(){el.style.background = ''}, 600);
  }
}

// ---- SIDEBAR TOGGLE ----
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ---- SEARCH ----
document.getElementById('searchInput').addEventListener('input', function() {
  render();
});

// ---- KEYBOARD ----
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('sidebar').classList.remove('open');
  }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ---- INIT ----
buildSidebar();
render();

</script>
</body>
</html>
